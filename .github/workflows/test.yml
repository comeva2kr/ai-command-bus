name: test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # The project is intentionally dependency-free, so there is nothing to
      # install — just run the node:test suite.
      - name: Run tests
        run: node --test test/*.test.js
