<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#12151b" />
    <title>관리자 콘솔 · 찐맛집</title>
    <link rel="stylesheet" href="/admin.css" />
  </head>
  <body>
    <header class="a-top">
      <div class="a-brand">🛡️ 찐맛집 <b>관리자 콘솔</b></div>
      <nav class="a-nav">
        <a href="/" class="a-link">← 사용자 화면</a>
        <button id="refresh" class="a-btn" type="button">↻ 새로고침</button>
      </nav>
    </header>

    <main class="a-main">
      <!-- 요약 대시보드 -->
      <section class="tiles" id="tiles"></section>

      <!-- 판정 분포 -->
      <section class="panel">
        <h2>판정 분포</h2>
        <div class="dist" id="dist"></div>
      </section>

      <!-- 담합 링 -->
      <section class="panel">
        <h2>🕸️ 탐지된 담합 링 (교차업소 락스텝)</h2>
        <div id="rings" class="rings"></div>
      </section>

      <!-- 업소 검수 -->
      <section class="panel">
        <div class="panel-head">
          <h2>업소 검수</h2>
          <input id="q" class="search" type="search" placeholder="업소명 검색…" />
        </div>
        <div class="verdict-filter" id="vfilter"></div>
        <div class="table" id="table"></div>
      </section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
