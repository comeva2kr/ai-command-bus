<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>찐맛집 · 검증된 맛집만</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="hd">
        <button class="loc" id="locChip" type="button"><span class="pin">📍</span> <span id="locName">강남역</span> <i>▾</i></button>
        <div class="hd-title">찐맛집</div>
        <button class="hd-ic" id="openFilter" type="button" aria-label="필터">⚙️</button>
      </header>

      <nav class="cats" id="cats"></nav>

      <div class="ctrl">
        <div class="seg" id="verifiedSeg">
          <button class="on" data-mode="verified" type="button">검증된 곳만</button>
          <button data-mode="all" type="button">전체 보기</button>
        </div>
        <button class="filterbtn" id="openFilter2" type="button">필터 <span class="dot" id="filterDot" hidden>0</span></button>
      </div>

      <div class="count" id="count">—</div>
      <main class="list" id="list"></main>
    </div>

    <div class="scrim" id="scrim" hidden></div>

    <!-- 위치 -->
    <section class="sheet" id="sheetLoc" aria-hidden="true">
      <div class="grip"></div>
      <h2>위치 설정</h2>
      <div class="sheet-scroll">
        <div class="sec">
          <button class="btn btn-ghost" id="useGeo" type="button">📍 내 현재 위치 사용</button>
        </div>
        <div class="sec">
          <h3>기준 지역</h3>
          <select id="near"></select>
        </div>
        <div class="sec">
          <h3>이동 범위</h3>
          <div class="row2">
            <select id="mode">
              <option value="car">🚗 차</option><option value="transit">🚌 대중교통</option>
              <option value="bike">🚲 자전거</option><option value="walk">🚶 도보</option>
            </select>
            <div class="fld">시간 <b id="minsOut">30</b>분<input type="range" id="minutes" min="5" max="60" step="5" value="30" /></div>
          </div>
          <label class="switch-row">위치로 거리 필터<span class="switch"><input type="checkbox" id="useLocation" checked /><span class="track"></span></span></label>
        </div>
      </div>
      <button class="btn btn-primary" id="applyLoc" type="button">적용</button>
    </section>

    <!-- 필터 -->
    <section class="sheet" id="sheetFilter" aria-hidden="true">
      <div class="grip"></div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <h2>필터</h2><button class="btn-reset" id="resetFilter" type="button">초기화</button>
      </div>
      <div class="sheet-scroll">
        <div class="sec"><h3>음식 종류</h3><div class="pills" id="cuisines"></div></div>
        <div class="sec"><h3>메뉴로 찾기</h3><select id="menu"><option value="">전체</option></select>
          <div class="pills" id="menuAttrs" style="margin-top:10px"></div></div>
        <div class="sec"><h3>이런 곳이면 좋아요</h3><div id="featureSwitches"></div>
          <label class="switch-row">프랜차이즈 제외<span class="switch"><input type="checkbox" id="excludeFranchise" /><span class="track"></span></span></label>
          <label class="switch-row">가성비 위주 제외 (분위기 있는 곳)<span class="switch"><input type="checkbox" id="excludeCheap" /><span class="track"></span></span></label>
        </div>
        <div class="sec"><h3>가격대 <b id="priceOut" style="color:var(--ink)">₩ ~ ₩₩₩₩</b></h3>
          <div class="row2"><input type="range" id="priceMin" min="1" max="4" value="1" /><input type="range" id="priceMax" min="1" max="4" value="4" /></div></div>
      </div>
      <button class="btn btn-primary" id="applyFilter" type="button">결과 보기</button>
    </section>

    <!-- 상세 -->
    <section class="sheet" id="sheetDetail" aria-hidden="true">
      <div class="grip"></div>
      <div class="sheet-scroll" id="detailBody"></div>
      <div class="sheet-actions" id="detailActions"></div>
    </section>

    <script src="/app.js"></script>
  </body>
</html>
