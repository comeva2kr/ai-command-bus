  --surface: #f7f8fa;
  --line: #e9ecef;
  --line2: #f1f3f5;
  --ink: #191f28;

  --brand-weak: #e6f7f0;
  --gem: #f08c00;       /* amber: top-pick "찐맛집" marker only */
  --gem-weak: #fff4e2;
  --warn: #e8590c;
  --danger: #f03e3e;
  --shadow: 0 1px 2px rgba(0,0,0,.04), 0 6px 20px rgba(17,24,39,.05);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; background: var(--bg); }
body {
  color: var(--ink);
  font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
}
button { font: inherit; cursor: pointer; color: inherit; }
h1,h2,h3,h4 { margin: 0; }

.app {
  max-width: 480px; margin: 0 auto; min-height: 100vh;

}

<script>
/* geo.js */
const { haversineKm, travelMinutes, travelBudgetToRadiusKm, resolveOrigin, TRAVEL_SPEEDS_KMH, LANDMARKS } = (() => {
// Geospatial helpers: distance, travel-time, and named-landmark resolution.
//
// Everything is dependency-free so the platform runs with plain Node.

const EARTH_RADIUS_KM = 6371;

// Rough average urban travel speeds (km/h) used to translate a "N minutes"
// travel budget into a search radius, and to estimate per-restaurant travel
// time. These are deliberate, conservative city-traffic numbers.
// Blended effective speeds (km/h) after the detour factor. `car` is a mix of
// dense-urban crawl and arterial/expressway running so a single knob covers
// both a short "차로 10분" city hop and a longer "차로 30분" regional trip.
// A production deployment would swap these for a routing/ETA API.
const TRAVEL_SPEEDS_KMH = {
  walk: 4.5,
  bike: 14,
  car: 40,
  transit: 22
};

// A small set of well-known Seoul landmarks so "near X" searches work without
// an external geocoder. Extend freely.
const LANDMARKS = {
  강남역: { lat: 37.4979, lng: 127.0276 },
  홍대입구역: { lat: 37.5571, lng: 126.9245 },
  성수역: { lat: 37.5446, lng: 127.0559 },
  이태원: { lat: 37.5345, lng: 126.9946 },
  여의도: { lat: 37.5216, lng: 126.9243 },
  잠실역: { lat: 37.5133, lng: 127.1001 },
  판교역: { lat: 37.3949, lng: 127.1112 },
  서울역: { lat: 37.5547, lng: 126.9707 },
  광화문: { lat: 37.5759, lng: 126.9769 },
  건대입구역: { lat: 37.5405, lng: 127.0703 },
  // 충청권 — 광역 이동시간("차로 30분") 검색용
  세종: { lat: 36.4801, lng: 127.289 },
  세종시청: { lat: 36.4801, lng: 127.289 },
  대전: { lat: 36.332, lng: 127.4342 },
  대전역: { lat: 36.332, lng: 127.4342 },
  청주: { lat: 36.6424, lng: 127.489 },
  청주시청: { lat: 36.6424, lng: 127.489 }
};

function toRadians(deg) {
  return (deg * Math.PI) / 180;
}

// Great-circle distance between two {lat,lng} points, in kilometers.
function haversineKm(a, b) {
  const dLat = toRadians(b.lat - a.lat);
  const dLng = toRadians(b.lng - a.lng);
  const lat1 = toRadians(a.lat);
  const lat2 = toRadians(b.lat);

  const h =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
  return 2 * EARTH_RADIUS_KM * Math.asin(Math.min(1, Math.sqrt(h)));
}

// Estimated travel time (minutes) to cover a straight-line distance. A detour
// factor accounts for the fact that real roads are longer than crow-flies.
function travelMinutes(distanceKm, mode = "car", detourFactor = 1.3) {
  const speed = TRAVEL_SPEEDS_KMH[mode] ?? TRAVEL_SPEEDS_KMH.car;
  return (distanceKm * detourFactor) / speed * 60;
}

// Translate a "I can spend N minutes traveling by <mode>" budget into an
// equivalent search radius in kilometers.
function travelBudgetToRadiusKm(minutes, mode = "car", detourFactor = 1.3) {
  const speed = TRAVEL_SPEEDS_KMH[mode] ?? TRAVEL_SPEEDS_KMH.car;
  return (speed * (minutes / 60)) / detourFactor;
}

// Resolve a location spec into a concrete {lat,lng} origin.
// Accepts either explicit coordinates or a `near` landmark name.
function resolveOrigin(location) {
  if (!location) return null;
  if (typeof location.lat === "number" && typeof location.lng === "number") {
    return { lat: location.lat, lng: location.lng };
  }
  if (location.near) {
    const key = String(location.near).replace(/\s+/g, "");
    const hit =
      LANDMARKS[key] ||
      LANDMARKS[Object.keys(LANDMARKS).find((k) => k.startsWith(key)) ?? ""];
    if (hit) return { ...hit };
  }
  return null;
}

return { haversineKm, travelMinutes, travelBudgetToRadiusKm, resolveOrigin, TRAVEL_SPEEDS_KMH, LANDMARKS };
})();

/* taxonomy.js */
const { normalizeList, FEATURE_KEYS, TAG_SYNONYMS, STYLE_SYNONYMS, CUISINE_SYNONYMS, MENU_SYNONYMS, MENU_ATTR_SYNONYMS, normalizeMenu, normalizeMenuAttr, normalizeTag, normalizeStyle, normalizeCuisine } = (() => {
// Controlled vocabulary + synonym normalization so that messy, real-world
// search terms ("뒷고기", "숙성 회", "키즈 카페") map onto stable filter keys.

// Feature flags a place can advertise. These are the "hard" lifestyle
// conditions a user typically stacks (아이 동반 가능? 파티션 있음? 주차 됨?).
const FEATURE_KEYS = [

/* textintegrity.js */
const { textIntegrity } = (() => {
// Text-integrity signals: near-duplicate/templated reviews and AI-generated
// text. These activate only when reviews carry actual `text`; otherwise they
// return nulls and have no effect (backward compatible).
//
//   • Near-duplicate detection — copy-paste "template" reviews across accounts
//     are a classic spam tell. We shingle each review into word 3-grams and
//     cluster by Jaccard similarity (a lightweight MinHash-free approximation).
//   • AI-generated detection — LLM-written reviews are fluent but generic and
//     detail-poor. Real detectors use perplexity/burstiness; here we consume an
//     upstream detector's per-review `ai` probability when present, and fall
//     back to a transparent heuristic (generic superlatives, no concrete detail,
//     uniform "fluent" length). See Ott et al. (ACL'11) for why text alone is
//     weak — this is a corroborating signal, not a sole judge.

const clamp01 = (x) => Math.max(0, Math.min(1, x));

function normalize(text) {
  return String(text || "")
    .toLowerCase()
    .replace(/[^\p{L}\p{N}\s]/gu, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function shingles(text, k = 3) {
  const words = normalize(text).split(" ").filter(Boolean);
  if (words.length < k) return new Set(words);
  const out = new Set();
  for (let i = 0; i <= words.length - k; i++) out.add(words.slice(i, i + k).join(" "));
  return out;
}

function jaccard(a, b) {
  if (!a.size || !b.size) return 0;
  let inter = 0;
  for (const x of a) if (b.has(x)) inter++;
  return inter / (a.size + b.size - inter);
}

// Generic-superlative / detail-poor heuristic for AI or template text (0..1).
const GENERIC_TOKENS = [
  "정말", "너무", "최고", "강추", "분위기", "맛있", "완벽", "인생", "친절", "만족",
  "amazing", "perfect", "delicious", "great", "wonderful", "highly recommend"
];
function aiHeuristic(text) {
  const norm = normalize(text);
  const words = norm.split(" ").filter(Boolean);
  if (words.length === 0) return 0.5;
  const generic = GENERIC_TOKENS.filter((t) => norm.includes(t)).length;
  const hasNumbers = /\d/.test(text); // concrete detail (price, count, time)
  const genericDensity = clamp01(generic / 4);
  // Fluent-but-generic: many superlatives, no concrete numbers, mid length.
  let score = 0.25 + genericDensity * 0.5 - (hasNumbers ? 0.25 : 0);
  if (words.length >= 25 && words.length <= 80) score += 0.15; // uniform "essay" length
  return clamp01(score);
}

// Compute duplication + AI ratios over a set of reviews (pass organic reviews).
function textIntegrity(reviews) {
  const withText = reviews.filter((r) => r.text);
  if (withText.length < 2) return { hasText: false, duplicationRatio: 0, aiRatio: 0 };

  // Near-duplicate clustering via pairwise Jaccard (small N).
  const sh = withText.map((r) => shingles(r.text));
  const dup = new Array(withText.length).fill(false);
  for (let i = 0; i < withText.length; i++) {
    for (let j = i + 1; j < withText.length; j++) {
      if (jaccard(sh[i], sh[j]) >= 0.8) { dup[i] = true; dup[j] = true; }
    }
  }
  const duplicationRatio = dup.filter(Boolean).length / withText.length;

  const aiScores = withText.map((r) =>
    typeof r.ai === "number" ? clamp01(r.ai) : aiHeuristic(r.text)
  );
  const aiRatio = aiScores.filter((s) => s >= 0.6).length / withText.length;

  return {
    hasText: true,
    duplicationRatio: Number(duplicationRatio.toFixed(2)),
    aiRatio: Number(aiRatio.toFixed(2))
  };
}


return { textIntegrity };
})();

/* timeseries.js */
const { timeSeriesAnomaly } = (() => {
// Time-series rating-spike anomaly (Xie et al., "Review Spam Detection via
// Temporal Pattern Discovery", KDD 2012). Xie's insight: a spam attack shows up
// as a spike in review VOLUME that is correlated with an abnormal shift in
// average RATING. This catches manipulation on an otherwise-established venue —
// a long, healthy history plus a sudden recent cluster of inflated 5★ reviews —
// which whole-span burst detection misses (the spike is small relative to the
// long history, so the global burst fraction stays low).

const mean = (xs) => (xs.length ? xs.reduce((a, b) => a + b, 0) / xs.length : 0);

// Bucket reviews into 30-day windows and look for a volume spike whose rating
// is anomalously higher than the rest of the history.
function timeSeriesAnomaly(reviews) {
  const clean = reviews.filter((r) => !(r.paid || r.type === "sponsored"));
  const empty = { anomaly: false, spikeShare: 0, ratingLift: 0, spikeMean: 0 };
  if (clean.length < 8) return empty;

  const days = clean.map((r) => r.daysAgo ?? 0);
  const span = Math.max(...days) - Math.min(...days);
  if (span < 60) return empty; // need real history to define a baseline

  const buckets = new Map(); // 30-day bucket index -> [ratings]
  for (const r of clean) {
    const b = Math.floor((r.daysAgo ?? 0) / 30);
    if (!buckets.has(b)) buckets.set(b, []);
    buckets.get(b).push(r.rating ?? 5);
  }
  const groups = [...buckets.values()];
  let maxi = 0;
  for (let i = 1; i < groups.length; i++) if (groups[i].length > groups[maxi].length) maxi = i;

  const spikeShare = groups[maxi].length / clean.length;
  const spikeMean = mean(groups[maxi]);
  const rest = groups.filter((_, i) => i !== maxi).flat();
  const baseMean = rest.length ? mean(rest) : spikeMean;
  const ratingLift = spikeMean - baseMean;

  // Volume concentrated in one window AND that window rated well above baseline.
  const anomaly = spikeShare >= 0.33 && ratingLift >= 0.4 && spikeMean >= 4.6;
  return {
    anomaly,
    spikeShare: Number(spikeShare.toFixed(2)),
    ratingLift: Number(ratingLift.toFixed(2)),
    spikeMean: Number(spikeMean.toFixed(2))
  };
}


return { timeSeriesAnomaly };
})();

/* authenticity.js */
const { isPaidReview, scoreAuthenticity, classOf } = (() => {
// 찐맛집 판별 엔진 (authenticity scoring) — multi-source edition.
//
// The hard problem: across an ocean of restaurant data (TikTok, YouTube Shorts,
// Instagram/Reels, blogs, communities, Naver/Daum/Kakao Map, discovery apps like
// CatchTable/MangoPlate/DiningCode…), *words are cheap and easy to fake*. Two
// ideas make the algorithm robust as sources multiply:
//
//   1. SOURCE-CLASS trust + cross-class corroboration. Short-form video has huge
//      reach but low trust (ad/viral-driven); map/app/community are harder to
//      game. A place must be corroborated across INDEPENDENT classes — not just
//      go viral on one.
//   2. BEHAVIORAL signals (revealed preference): reservations, waitlist, revisit
//      rate, saves. People actually returning and waiting in line is far harder
//      to fake than posting, so it carries the most weight — and a "viral bubble"
//      (short-form spike with no behavioral/map corroboration) is vetoed.
//
// Every sub-score and veto reason is reported (explainable), so no black box.

const AD_MARKERS = [
  "광고", "협찬", "제공받아", "제공 받아", "원고료", "소정의",
  "체험단", "기자단", "sponsored", "paidpartnership", "유료광고"
];

// Map each platform to a trust CLASS. New platforms just need one line here.
const PLATFORM_CLASS = {
  tiktok: "short_video",
  youtube_shorts: "short_video",
  reels: "short_video",
  instagram_reels: "short_video",
  instagram: "social",
  naver_blog: "social",
  youtube: "social",
  naver_place: "map",
  naver_map: "map",
  daum_map: "map",
  kakao_map: "map",
  google: "map",
  catchtable: "app",
  mangoplate: "app",
  diningcode: "app",
  siksin: "app",
  community: "community"
};

// Trust weight per class. Short-form is discounted; behavior corroboration and
// low-incentive communities are trusted most.
const CLASS_WEIGHT = {
  short_video: 0.5,
  social: 0.75,
  map: 1.0,
  app: 1.0,
  community: 1.2
};

// "Hard" classes are the ones expensive to astroturf at scale — a genuine place
// almost always shows up in at least one of them.
const HARD_CLASSES = new Set(["map", "app", "community"]);

const CFG = {
  MIN_ORGANIC: 6,
  CLASS_BREADTH_TARGET: 2.8, // 가중 클래스 신뢰 합이 이 정도면 breadth 만점
  LONGEVITY_DAYS: 365,
  SUSTAIN_TARGET_DAYS: 540,
  BURST_WINDOW_DAYS: 30,
  BURST_FRACTION: 0.7,
  BURST_MAX_SPAN: 150,
  ASTROTURF_UNIQUE_RATIO: 0.4,
  ASTROTURF_HHI: 0.35,
  AD_DOMINATED_RATIO: 0.6,
  VIRAL_SHORT_SHARE: 0.55, // 숏폼 비중이 이 위이고
  VIRAL_BEHAVIOR_FLOOR: 0.4, // 행동 확증이 이 아래면 "바이럴 거품"
  RING_SHARE_VETO: 0.34, // 리뷰링(락스텝) 계정 비중이 이 위면 담합 의심
  NET_FRAUD_VETO: 0.8, // 네트워크 전파 사기확률이 이 위면 veto
  NET_FRAUD_WARN: 0.62 // 이 위면 소프트 감점(네트워크 주의)
};

// Factor weights (sum = 1). Behavioral revealed-preference carries the most.
const WEIGHTS = {
  behavior: 0.22, // 예약·웨이팅·재방문·저장 (조작 최난이도)
  diversity: 0.18, // 작성자 다양성 (어뷰징 반대)
  local: 0.17, // 로컬·재방문 리뷰
  classBreadth: 0.13, // 독립 소스 클래스 교차 확증
  sustain: 0.12, // 시간 지속성 + 노포
  realism: 0.10, // 평점 분포 현실성
  texture: 0.08 // 후기 구체성
};



const clamp01 = (x) => Math.max(0, Math.min(1, x));
const mean = (xs) => (xs.length ? xs.reduce((a, b) => a + b, 0) / xs.length : 0);
const stdev = (xs) => {
  if (xs.length < 2) return 0;
  const m = mean(xs);
  return Math.sqrt(mean(xs.map((x) => (x - m) ** 2)));
};

const classOf = (platform) => PLATFORM_CLASS[platform] ?? "social";

function isPaidReview(review) {
  if (review.paid === true || review.type === "sponsored" || review.type === "ad") return true;
  const text = [review.markers, review.text, review.disclosure]
    .flat()
    .filter(Boolean)
    .join(" ")
    .toLowerCase()
    .replace(/\s+/g, "");
  return AD_MARKERS.some((m) => text.includes(m.replace(/\s+/g, "")));
}

function authorHHI(reviews) {
  const counts = new Map();
  for (const r of reviews) {
    const a = r.author ?? "anon";
    counts.set(a, (counts.get(a) ?? 0) + 1);
  }
  const total = reviews.length || 1;
  let hhi = 0;
  for (const n of counts.values()) hhi += (n / total) ** 2;
  return { hhi, uniqueAuthors: counts.size };
}

function maxWindowFraction(daysAgo) {
  if (daysAgo.length === 0) return 0;
  const sorted = [...daysAgo].sort((a, b) => a - b);
  let best = 0;
  let j = 0;
  for (let i = 0; i < sorted.length; i++) {
    while (sorted[i] - sorted[j] > CFG.BURST_WINDOW_DAYS) j++;
    best = Math.max(best, i - j + 1);
  }
  return best / sorted.length;
}

// Revealed-preference score from behavioral data (0..1). Absent => neutral 0.5.
function behaviorScore(b) {
  if (!b) return { score: 0.5, present: false };
  // Benchmarks tuned to realistic "excellent" values (revisit ~50% is superb;
  // a genuine hotspot sees ~50 reservations/wk, ~30min waits, ~1.8k saves).
  const revisit = clamp01((b.revisitRate ?? 0) / 0.5);
  const resv = clamp01((b.reservationsPerWeek ?? 0) / 50);
  const wait = clamp01((b.avgWaitMin ?? 0) / 30);
  const saves = clamp01((b.saves ?? 0) / 1800);
  const score = clamp01(0.45 * revisit + 0.25 * resv + 0.15 * wait + 0.15 * saves);
  return { score, present: true };
}

// Rating-distribution shape realism (0..1) with J-curve / missing-middle /
// U-shape awareness.
function distributionRealism(ratings) {
  if (ratings.length < 3) return { score: 0.5, missingMiddle: false, uShape: false };
  const n = ratings.length;
  const share = (k) => ratings.filter((r) => Math.round(r) === k).length / n;
  const s5 = share(5), s4 = share(4), s3 = share(3), s2 = share(2), s1 = share(1);
  const middle = s3 + s4; // 3-4★ "middle" band
  const hasCriticism = s1 + s2 + s3 > 0;
  const sd = stdev(ratings);
  const missingMiddle = s5 >= 0.7 && middle < 0.1; // 별5 도배, 중간 없음
  const uShape = s5 >= 0.4 && s1 >= 0.25 && middle < 0.25; // 양극단(경쟁사 공격 등)
  let score = 0.4 + Math.min(0.35, sd * 0.5) + (hasCriticism ? 0.25 : 0);
  if (missingMiddle) score = Math.min(score, 0.25);
  if (uShape) score = Math.min(score, 0.2);
  return { score: clamp01(score), missingMiddle, uShape };
}

function scoreAuthenticity(restaurant, cfg = {}, context = {}) {
  const C = { ...CFG, ...cfg };
  const ringAuthors = context.ringAuthors ?? new Set();
  const authorTotals = context.authorTotals ?? null;
  const networkFraud = context.networkFraud?.get?.(restaurant.id) ?? null;
  const reviews = restaurant.reviews ?? [];
  const total = reviews.length;
  const organic = reviews.filter((r) => !isPaidReview(r));
  const paidCount = total - organic.length;
  const paidRatio = total ? paidCount / total : 0;

  // --- source classes present (organic) ---
  const classSet = new Set(organic.map((r) => classOf(r.platform)));
  const platformSet = new Set(organic.map((r) => r.platform));
  const trust = [...classSet].reduce((s, c) => s + (CLASS_WEIGHT[c] ?? 0.6), 0);
  const classBreadth = clamp01(trust / C.CLASS_BREADTH_TARGET);
  const shortCount = organic.filter((r) => classOf(r.platform) === "short_video").length;
  const shortShare = organic.length ? shortCount / organic.length : 0;
  const hasHardClass = [...classSet].some((c) => HARD_CLASSES.has(c));

  // --- author diversity (anti-astroturf) ---
  const { hhi, uniqueAuthors } = authorHHI(organic);
  const uniqueRatio = organic.length ? uniqueAuthors / organic.length : 0;
  const diversity = clamp01(0.5 * uniqueRatio + 0.5 * (1 - Math.min(1, hhi)));

  // --- temporal sustain + longevity, minus burst ---
  const days = organic.map((r) => r.daysAgo ?? 0);
  const span = days.length ? Math.max(...days) - Math.min(...days) : 0;
  const hasLongevity = days.some((d) => d >= C.LONGEVITY_DAYS);
  const burstFrac = maxWindowFraction(days);
  const isBurst = burstFrac >= C.BURST_FRACTION && span <= C.BURST_MAX_SPAN;

    Math.min(1, span / C.SUSTAIN_TARGET_DAYS) + (hasLongevity ? 0.15 : 0) - (isBurst ? 0.4 : 0)
  );

  // --- local / repeat-visit reviews ---
  const localRatio = organic.length ? organic.filter((r) => r.local).length / organic.length : 0;
  const repeatRatio = organic.length ? organic.filter((r) => r.repeat).length / organic.length : 0;
  const local = clamp01(0.5 * localRatio + 0.5 * repeatRatio);

  // --- behavioral revealed preference ---

  // --- text specificity ---

  // --- rating-distribution realism (shape, not just variance) ---

  // Manipulated ones show a "missing middle" (all 5s, ~no 3-4s) or a U-shape
  // (5s + competitor-attack 1s). See Amazon/TripAdvisor distribution studies and
  // the bimodal/co-bursting review-spam literature.
  const ratings = organic.map((r) => r.rating ?? 5);

  const factors = {

  // with a burst + rating skew is the signature of a cheap-account attack that
  // evades author-diversity (every fake account is unique).
  const singletonRatio = authorTotals && organic.length
    ? organic.filter((r) => (authorTotals.get(r.author) ?? 1) <= 1).length / organic.length
    : null;

  const astroturf = organic.length >= 3 && (uniqueRatio < C.ASTROTURF_UNIQUE_RATIO || hhi > C.ASTROTURF_HHI);
  const adDominated = paidRatio > C.AD_DOMINATED_RATIO;

  const reviewRing = ringShare >= C.RING_SHARE_VETO;

  if (isBurst) flags.push("단기폭발");
  if (dist.uShape) flags.push("양극단분포");

  if (coordinatedBurst) { flags.push("조직적버스트"); score = Math.min(score, 38); }
  if (singletonAttack) { flags.push("싱글톤계정공격"); score = Math.min(score, 36); }
  if (ts.anomaly) { flags.push("평점급등이상(시계열)"); score = Math.min(score, 44); }
  if (duplicateText) { flags.push("복붙/템플릿리뷰"); score = Math.min(score, 34); }
  if (aiText) { flags.push("AI생성리뷰의심"); score = Math.min(score, 37); }
  if (astroturf) { flags.push("작성자편중(어뷰징의심)"); score = Math.min(score, 35); }
  if (reviewRing) { flags.push("리뷰링(담합/락스텝)"); score = Math.min(score, 33); }
  if (networkFraudHigh) { flags.push("네트워크사기전파"); score = Math.min(score, 38); }
  if (networkFraudMod) { flags.push("네트워크주의"); score = Math.min(score, 60); }
  if (adDominated) { flags.push("광고도배"); score = Math.min(score, 28); }

  const hardFake = astroturf || adDominated || thin || narrow || viralBubble ||
    reviewRing || coordinatedBurst || singletonAttack || duplicateText || aiText ||
    networkFraudHigh || ts.anomaly;
  let verdict;
  let verified;
  if (hardFake) {
    verdict = adDominated ? "광고의심"
      : reviewRing ? "담합의심"
      : networkFraudHigh ? "네트워크사기"
      : aiText ? "AI리뷰의심"
      : duplicateText ? "복붙리뷰"
      : viralBubble ? "바이럴거품"
      : coordinatedBurst ? "조직적버스트"
      : singletonAttack ? "싱글톤공격"
      : ts.anomaly ? "평점급등의심"

    verified = false;

  else if (score >= 65) { verdict = "검증됨"; verified = true; }
  else if (score >= 45) { verdict = "보통"; verified = false; }
  else { verdict = "미검증"; verified = false; }

    reviewRing, coordinatedBurst, singletonAttack, singletonRatio,
    duplicateText, aiText, dupRatio: txt.duplicationRatio, aiRatio: txt.aiRatio,

    spikeAnomaly: ts.anomaly, spikeShare: ts.spikeShare, ratingLift: ts.ratingLift,

    authenticityScore: score,
    verdict,
    verified,
    flags,
    reasons,
    breakdown: Object.fromEntries(

    ),
    stats: {
      organicReviews: organic.length,
      paidFiltered: paidCount,
      paidRatio: Number(paidRatio.toFixed(2)),
      sourceClasses: [...classSet],
      platforms: [...platformSet],
      platformCount: platformSet.size,
      shortFormShare: Number(shortShare.toFixed(2)),
      uniqueAuthors,
      authorHHI: Number(hhi.toFixed(3)),
      spanDays: span,
      localRatio: Number(localRatio.toFixed(2)),
      repeatRatio: Number(repeatRatio.toFixed(2)),
      behaviorScore: Number(behavior.score.toFixed(2)),
      ringShare: Number(ringShare.toFixed(2)),
      singletonRatio: singletonRatio == null ? null : Number(singletonRatio.toFixed(2)),
      duplicationRatio: txt.hasText ? txt.duplicationRatio : null,
      aiRatio: txt.hasText ? txt.aiRatio : null,
      networkFraud,
      spikeShare: ts.spikeShare,
      ratingShape: dist.uShape ? "U자(양극단)" : dist.missingMiddle ? "중간없음(별5도배)" : "정상(J커브)"
    }
  };
}

  if (ctx.repeatRatio >= 0.35) R.push(`재방문/단골 언급 ${Math.round(ctx.repeatRatio * 100)}%`);
  if (ctx.hasCriticism) R.push("솔직한 단점 리뷰 존재(별점 조작 아님)");

/* corpus.js */
const { analyzeCorpus } = (() => {
// Corpus-level fraud analysis (cross-restaurant graph signals).
//
// Some of the strongest, hardest-to-fake fraud signals only appear when you look
// ACROSS restaurants, not at one place in isolation:
//
//   • Review rings / lockstep behavior — the same small set of accounts
//     co-reviewing the same multiple venues within tight time windows.
//     (Beutel et al., "CopyCatch", WWW 2013; Hooi et al., "FRAUDAR", KDD 2016.)
//   • Reviewer deviation — accounts that habitually rate against the crowd
//     consensus. (Mukherjee et al., "What Yelp Fake Review Filter Might Be
//     Doing?", ICWSM 2013 — behavioral features beat linguistic ones.)
//
// FRAUDAR's key insight is *camouflage resistance*: a ring cannot lower its own
// suspicion by also posting honest-looking reviews on real venues. We approximate
// that here by keying on the ring's shared, time-locked co-reviews — extra
// unrelated reviews by ring members don't dilute the shared-venue evidence.


const LOCKSTEP_WINDOW_DAYS = 30;
const MIN_SHARED_VENUES = 2; // a pair must co-review >= this many venues to count

// Build cross-venue reviewer signals from the whole dataset.
function analyzeCorpus(restaurants) {
  // author -> Map(placeId -> [daysAgo,...]) over organic reviews only
  const authorPlaces = new Map();
  // placeId -> consensus (median) rating, for reviewer-deviation
  const consensus = new Map();
  // author -> total organic review count across the whole corpus (singleton = 1)
  const authorTotals = new Map();

  for (const r of restaurants) {
    const organic = (r.reviews ?? []).filter((rev) => !isPaidReview(rev));
    if (organic.length) {
      const sorted = organic.map((x) => x.rating ?? 5).sort((a, b) => a - b);
      consensus.set(r.id, sorted[Math.floor(sorted.length / 2)]);
    }
    for (const rev of organic) {
      const a = rev.author;
      if (!a) continue;
      if (!authorPlaces.has(a)) authorPlaces.set(a, new Map());
      const pm = authorPlaces.get(a);
      pm.set(r.id, [...(pm.get(r.id) ?? []), rev.daysAgo ?? 0]);
      authorTotals.set(a, (authorTotals.get(a) ?? 0) + 1);
    }
  }

  // Reviewer deviation: how far an author's ratings sit from each venue's
  // consensus, averaged over their reviews. High = contrarian/extreme (spammy).
  const authorDeviation = new Map();
  for (const [a, pm] of authorPlaces) {
    let sum = 0;
    let n = 0;
    for (const [placeId, days] of pm) {
      const c = consensus.get(placeId);
      if (c == null) continue;
      // deviation uses this author's rating on that place; recover from reviews:
      // approximated by |their entries' count| — deviation needs the rating,
      // so we recompute below from the restaurants pass.
      n += days.length;
    }
    authorDeviation.set(a, { reviews: n, places: pm.size });
  }

  // Ring detection: author pairs sharing >= MIN_SHARED_VENUES venues with
  // time-locked co-reviews. Union those authors into ring membership.
  const multiPlace = [...authorPlaces.entries()].filter(([, pm]) => pm.size >= MIN_SHARED_VENUES);
  const ringAuthors = new Set();
  const rings = [];
  for (let i = 0; i < multiPlace.length; i++) {
    for (let j = i + 1; j < multiPlace.length; j++) {
      const [a, pmA] = multiPlace[i];
      const [b, pmB] = multiPlace[j];
      const shared = [...pmA.keys()].filter((p) => pmB.has(p));
      if (shared.length < MIN_SHARED_VENUES) continue;
      const lockstep = shared.some((p) =>
        pmA.get(p).some((x) => pmB.get(p).some((y) => Math.abs(x - y) <= LOCKSTEP_WINDOW_DAYS))
      );
      if (lockstep) {
        ringAuthors.add(a);
        ringAuthors.add(b);
        rings.push({ authors: [a, b], venues: shared });
      }
    }
  }

  return { ringAuthors, rings, consensus, authorPlaces, authorTotals };
}


return { analyzeCorpus };
})();

/* beliefprop.js */
const { propagateFraud } = (() => {
// Network fraud propagation via Loopy Belief Propagation on a reviewer–venue
// Markov Random Field. Based on the FraudEagle / SpEagle family (Akoglu et al.,
// "Opinion Fraud Detection in Online Reviews by Network Effects", ICWSM 2013;
// Rayana & Akoglu, "SpEagle", KDD 2015).
//
// Why this matters: local, per-venue signals miss fraud that only shows up in
// the GRAPH. If a venue is reviewed by accounts that also review known-bad
// venues, suspicion should propagate to it — even if that venue, viewed alone,
// looks clean and no single veto fires. BP does exactly this: it spreads belief
// along the reviewer↔venue graph until it converges, unifying the ring/collusion
// signals into one principled posterior fraud probability per venue.
//
// States: reviewer ∈ {honest, fraud}, venue ∈ {genuine, bad}. Edge potential is
// homophilic (fraud reviewers ↔ bad venues). Priors seed fraud reviewers (ring
// members) high; everything else neutral-honest. We run sum-product LBP.


const EPS = 0.2; // edge disagreement potential (smaller = stronger coupling)
const ITERS = 12;
const RING_PRIOR = 0.92; // fraud prior for detected ring accounts
const BASE_PRIOR = 0.32; // fraud prior for ordinary reviewers

// Edge compatibility ψ(reviewerFraud?, venueBad?).
function psi(revFraud, venueBad) {
  return revFraud === venueBad ? 1 - EPS : EPS; // agree(F,B)/(H,G) high; disagree low
}

// Quick per-venue "bad" prior from cheap metadata features (SpEagle-style:
// priors from local signals, then BP refines across the graph). Deliberately
// coarse — the network step does the real work of spreading belief.
function venueBadPrior(restaurant, ringAuthors) {
  const reviews = restaurant.reviews ?? [];
  const organic = reviews.filter((r) => !(r.paid || r.type === "sponsored"));
  const n = organic.length || 1;
  const paidRatio = (reviews.length - organic.length) / (reviews.length || 1);
  const ringShare = organic.filter((r) => ringAuthors.has(r.author)).length / n;
  const s5 = organic.filter((r) => Math.round(r.rating ?? 5) === 5).length / n;
  const mid = organic.filter((r) => [3, 4].includes(Math.round(r.rating ?? 5))).length / n;
  const allFiveMissingMiddle = s5 >= 0.7 && mid < 0.1;
  let p = 0.4;
  if (ringShare >= 0.3) p += 0.35;
  if (paidRatio > 0.5) p += 0.25;
  if (allFiveMissingMiddle) p += 0.2;
  return Math.max(0.1, Math.min(0.9, p));
}

function propagateFraud(restaurants, { ringAuthors = new Set() } = {}) {
  // Build bipartite edges over organic reviews. Dedupe (author,venue) pairs — a
  // reviewer who posts on a venue multiple times is still one edge, else the
  // message product would count the same message several times and diverge.
  const edgeSet = new Set();
  const edges = []; // { u: authorId, v: venueId }
  const venueIds = [];
  const authorSet = new Set();
  for (const r of restaurants) {
    venueIds.push(r.id);
    for (const rev of r.reviews ?? []) {
      if (isPaidReview(rev) || !rev.author) continue;
      const key = `${rev.author}|${r.id}`;
      if (!edgeSet.has(key)) {
        edgeSet.add(key);
        edges.push({ u: rev.author, v: r.id });
      }
      authorSet.add(rev.author);
    }
  }

  // Priors as P(fraud) / P(bad).
  const revPrior = new Map();
  for (const a of authorSet) revPrior.set(a, ringAuthors.has(a) ? RING_PRIOR : BASE_PRIOR);
  const venuePrior = new Map();
  for (const r of restaurants) venuePrior.set(r.id, venueBadPrior(r, ringAuthors));

  // Messages: keyed "u|v" and "v|u", each = [pHonestOrGenuine, pFraudOrBad].
  const mUV = new Map(); // reviewer -> venue
  const mVU = new Map(); // venue -> reviewer
  for (const { u, v } of edges) {
    mUV.set(`${u}|${v}`, [0.5, 0.5]);
    mVU.set(`${v}|${u}`, [0.5, 0.5]);
  }

  // Adjacency.
  const revNbrs = new Map(); // author -> [venueId]
  const venNbrs = new Map(); // venueId -> [author]
  for (const { u, v } of edges) {
    (revNbrs.get(u) ?? revNbrs.set(u, []).get(u)).push(v);
    (venNbrs.get(v) ?? venNbrs.set(v, []).get(v)).push(u);
  }

  const norm = ([a, b]) => {
    const s = a + b || 1;
    return [a / s, b / s];
  };

  for (let it = 0; it < ITERS; it++) {
    // reviewer -> venue messages
    for (const [u, vs] of revNbrs) {
      const prior = [1 - revPrior.get(u), revPrior.get(u)];
      for (const v of vs) {
        // product of incoming venue->reviewer messages except from v
        let pH = prior[0];
        let pF = prior[1];
        for (const v2 of vs) {
          if (v2 === v) continue;
          const m = mVU.get(`${v2}|${u}`);
          pH *= m[0];
          pF *= m[1];
        }
        // marginalize reviewer state against edge potential for each venue state
        const toGenuine = pH * psi(0, 0) + pF * psi(1, 0);
        const toBad = pH * psi(0, 1) + pF * psi(1, 1);
        mUV.set(`${u}|${v}`, norm([toGenuine, toBad]));
      }
    }
    // venue -> reviewer messages
    for (const [v, us] of venNbrs) {
      const vp = venuePrior.get(v) ?? 0.4;
      const prior = [1 - vp, vp];
      for (const u of us) {
        let pG = prior[0];
        let pB = prior[1];
        for (const u2 of us) {
          if (u2 === u) continue;
          const m = mUV.get(`${u2}|${v}`);
          pG *= m[0];
          pB *= m[1];
        }
        const toHonest = pG * psi(0, 0) + pB * psi(0, 1);
        const toFraud = pG * psi(1, 0) + pB * psi(1, 1);
        mVU.set(`${v}|${u}`, norm([toHonest, toFraud]));
      }
    }
  }

  // Venue beliefs.
  const fraud = new Map();
  for (const v of venueIds) {
    const vp = venuePrior.get(v) ?? 0.4;
    let pG = 1 - vp;
    let pB = vp;
    for (const u of venNbrs.get(v) ?? []) {
      const m = mUV.get(`${u}|${v}`);
      pG *= m[0];
      pB *= m[1];
    }
    const [, b] = norm([pG, pB]);
    fraud.set(v, Number(b.toFixed(3)));
  }
  return fraud;
}


return { propagateFraud };
})();

// Ingestion layer.
//
// Runs the 찐맛집 authenticity engine over raw multi-source records. First it
// analyzes the whole corpus for cross-venue graph fraud (review rings / lockstep
// collusion), then scores each place with that context so ring members are
// caught even when a place looks clean in isolation (camouflage-resistant).
// By default only genuinely verified places survive.




// Score a single place. Pass `context` (from analyzeCorpus) to enable the
// cross-venue ring signal; omit it for standalone scoring.
function verifyRestaurant(restaurant, options = {}, context = {}) {
  const auth = scoreAuthenticity(restaurant, options, context);
  return {
    ...restaurant,
    verified: auth.verified,
    verdict: auth.verdict,
    authenticityScore: auth.authenticityScore,
    // Alias retained so existing ranking/query code keeps working.
    verificationScore: auth.authenticityScore,
    flags: auth.flags,
    reasons: auth.reasons,
    breakdown: auth.breakdown,
    signals: auth.stats
  };
}

// Ingest a batch: analyze corpus once, score each place, drop non-verified.
function ingest(rawRestaurants, options = {}) {
  const { keepUnverified = false, ...cfg } = options;
  const context = analyzeCorpus(rawRestaurants);
  // Network fraud propagation (LBP) over the reviewer–venue graph.
  context.networkFraud = propagateFraud(rawRestaurants, { ringAuthors: context.ringAuthors });
  const scored = rawRestaurants.map((r) => verifyRestaurant(r, cfg, context));
  return keepUnverified ? scored : scored.filter((r) => r.verified);
}


return { verifyRestaurant, ingest };

/* filter.js */
const { normalizeQuery, evaluateHard, preferenceScore, applyFilters } = (() => {
// Multi-condition lifestyle filtering engine.
//
// A query stacks any number of independent conditions ("고깃집 AND 뒷고기 AND
// 프랜차이즈 아님 AND 키즈카페 있음"). Hard conditions exclude; soft
// preferences only boost ranking.


// Normalize a raw incoming query into canonical, deduped filter fields.
function normalizeQuery(query = {}) {
  return {
    styles: normalizeList(query.styles ?? query.style, normalizeStyle),
    cuisines: normalizeList(query.cuisines ?? query.cuisine, normalizeCuisine),
    tagsAll: normalizeList(query.tagsAll, normalizeTag),
    tagsAny: normalizeList(query.tagsAny, normalizeTag),
    excludeTags: normalizeList(query.excludeTags, normalizeTag),
    prefer: normalizeList(query.prefer, normalizeTag),
    // Menu-level search: match a signature dish, optionally with attributes
    // like 활(살아있는)/숙성/자연산.
    menus: normalizeList(query.menu ?? query.menus, normalizeMenu),
    menuAttrs: normalizeList(query.menuAttrs ?? query.menuAttr, normalizeMenuAttr),
    // Hard feature requirements, e.g. { kidsCafe: true, partition: true }.
    require: query.require ?? {},
    // Soft feature preferences, boost only.
    preferFeatures: query.preferFeatures ?? {},
    excludeFranchise: query.excludeFranchise === true,
    priceMin: query.priceMin ?? 1,
    priceMax: query.priceMax ?? 4,
    minRating: query.minRating ?? 0,
    minVerification: query.minVerification ?? 0
  };
}

// Return { pass, reasons } for a single restaurant against hard conditions.
function evaluateHard(restaurant, q) {
  const reasons = [];
  const style = restaurant.style;
  const cuisines = restaurant.cuisines || [];
  const tags = restaurant.tags || [];
  const features = restaurant.features || {};

  if (q.styles.length && !q.styles.includes(style)) {
    reasons.push(`style!=${q.styles.join("/")}`);
  }
  if (q.cuisines.length && !q.cuisines.some((c) => cuisines.includes(c))) {
    reasons.push(`cuisine!∋${q.cuisines.join("/")}`);
  }
  if (q.menus.length) {
    const menus = restaurant.menus || [];
    const match = menus.some((m) => {
      const name = normalizeMenu(m.name) ?? m.name;
      if (!q.menus.includes(name)) return false;
      const attrs = normalizeList(m.attrs, normalizeMenuAttr);
      return q.menuAttrs.every((a) => attrs.includes(a));
    });
    if (!match) {
      reasons.push(
        `no menu: ${q.menus.join("/")}${q.menuAttrs.length ? `(${q.menuAttrs.join(",")})` : ""}`
      );
    }
  }
  if (q.tagsAll.length && !q.tagsAll.every((t) => tags.includes(t))) {
    reasons.push(`missing tag(all): ${q.tagsAll.filter((t) => !tags.includes(t)).join(",")}`);
  }
  if (q.tagsAny.length && !q.tagsAny.some((t) => tags.includes(t))) {
    reasons.push(`missing tag(any): ${q.tagsAny.join("/")}`);
  }
  if (q.excludeTags.some((t) => tags.includes(t))) {
    reasons.push(`has excluded tag: ${q.excludeTags.filter((t) => tags.includes(t)).join(",")}`);
  }
  for (const [feat, want] of Object.entries(q.require)) {
    if (want && !features[feat]) reasons.push(`no feature: ${feat}`);
  }
  if (q.excludeFranchise && restaurant.franchise) reasons.push("franchise");
  if (restaurant.priceBand < q.priceMin || restaurant.priceBand > q.priceMax) {
    reasons.push(`price out of [${q.priceMin},${q.priceMax}]`);
  }
  if ((restaurant.rating ?? 0) < q.minRating) reasons.push("below minRating");
  if ((restaurant.verificationScore ?? 0) < q.minVerification) {
    reasons.push("below minVerification");
  }

  return { pass: reasons.length === 0, reasons };
}

// Soft preference score: rewards matching optional tags/features. 0..1-ish.
function preferenceScore(restaurant, q) {
  const tags = restaurant.tags || [];
  const features = restaurant.features || {};
  let hits = 0;
  let possible = 0;

  for (const t of q.prefer) {
    possible += 1;
    if (tags.includes(t)) hits += 1;
  }
  for (const [feat, want] of Object.entries(q.preferFeatures)) {
    if (!want) continue;
    possible += 1;
    if (features[feat]) hits += 1;
  }
  return possible ? hits / possible : 0;
}

// Filter a list against a normalized query. Returns items that pass all hard
// conditions, each annotated with a preference score.
function applyFilters(restaurants, rawQuery = {}) {
  const q = normalizeQuery(rawQuery);
  const passed = [];
  for (const r of restaurants) {
    const { pass } = evaluateHard(r, q);
    if (pass) passed.push({ ...r, preferenceScore: preferenceScore(r, q) });
  }
  return passed;
}

return { normalizeQuery, evaluateHard, preferenceScore, applyFilters };
})();

/* query.js */
const { resolveGeo, search } = (() => {
// High-level search: combine verification, geo (radius / travel-time / near),
// multi-condition filtering, and ranking into one call.




// Resolve the geo constraint into { origin, radiusKm, mode } (any may be null).
function resolveGeo(query = {}) {
  const origin = resolveOrigin(query.location);
  if (!origin) return { origin: null, radiusKm: null, mode: null };

  const mode = query.travel?.mode ?? "car";
  let radiusKm = query.radiusKm ?? null;
  if (radiusKm == null && query.travel?.minutes != null) {
    radiusKm = travelBudgetToRadiusKm(query.travel.minutes, mode);
  }
  return { origin, radiusKm, mode };
}

// Rank blends verification, rating, preference matches, and proximity.
function rankScore(r, { hasGeo }) {
  const verification = (r.verificationScore ?? 0) / 100; // 0..1
  const rating = (r.rating ?? 0) / 5; // 0..1
  const preference = r.preferenceScore ?? 0; // 0..1
  // Closer is better; decays to 0 by ~10km. Neutral when no location given.
  const proximity = hasGeo && r.distanceKm != null ? Math.max(0, 1 - r.distanceKm / 10) : 0.5;

  return (
    verification * 0.35 +
    rating * 0.25 +
    preference * 0.2 +
    proximity * 0.2
  );
}

// Main entry point.
//   rawRestaurants: source records (with `sources` mentions)
//   query: { location, radiusKm, travel, styles, cuisines, menu, require, ... }
function search(rawRestaurants, query = {}, options = {}) {
  // 1) Verify + drop advertising, unless explicitly asked to keep everything.
  const verified = ingest(rawRestaurants, {
    keepUnverified: query.includeUnverified === true,
    ...options.verify
  });

  // 2) Geo gate.
  const { origin, radiusKm, mode } = resolveGeo(query);
  let candidates = verified.map((r) => {
    if (!origin) return { ...r, distanceKm: null, travelMinutes: null };
    const distanceKm = haversineKm(origin, { lat: r.lat, lng: r.lng });
    return {
      ...r,
      distanceKm: Number(distanceKm.toFixed(2)),
      travelMinutes: Math.round(travelMinutes(distanceKm, mode))
    };
  });
  if (origin && radiusKm != null) {
    candidates = candidates.filter((r) => r.distanceKm <= radiusKm);
  }

  // 3) Multi-condition lifestyle/menu filters.
  const filtered = applyFilters(candidates, query);

  // 4) Rank.
  const hasGeo = Boolean(origin);
  const ranked = filtered
    .map((r) => ({ ...r, score: Number(rankScore(r, { hasGeo }).toFixed(4)) }))
    .sort((a, b) => b.score - a.score);

  return {
    meta: {
      total: ranked.length,
      origin,
      radiusKm: radiusKm != null ? Number(radiusKm.toFixed(2)) : null,
      travelMode: origin ? mode : null,
      verifiedOnly: query.includeUnverified !== true
    },
    results: ranked
  };
}

return { resolveGeo, search };
})();

const { SEED_RESTAURANTS } = (() => {
// Sample dataset with REVIEW-LEVEL signals so the 찐맛집 authenticity engine has
// real material to work with. `makeReviews` deterministically expands a compact
// spec into individual reviews (author, timestamp, rating, paid?, local?,
// repeat?, specificity) — no randomness, so scores are reproducible.
//
// The set deliberately includes fakes that PASS the attribute filters but must
// be rejected by the authenticity engine (e.g. an astroturfed 뒷고기+키즈카페
// 고깃집), proving the algorithm — not just tag matching — is what gates results.

// Expand a compact spec into review records.
//   platforms: cycled across reviews
//   count:     number of organic-ish reviews to generate
//   authors:   distinct author pool size (small => concentration/astroturf)
//   spanDays:  oldest review age; dates spread evenly down to ~recent
//   paid:      first N reviews flagged as sponsored
//   localRatio/repeatRatio: fraction marked local / repeat-visit
//   ratings:   rating pattern, cycled
//   specificity: base text-detail level
function makeReviews({
  platforms,
  count,
  authors,
  spanDays,
  paid = 0,
  localRatio = 0.5,
  repeatRatio = 0.4,
  ratings = [5, 4, 5, 4, 5, 3, 5, 4, 5, 5],
  specificity = 0.7,
  texts = null, // optional per-review text (cycled) for text-integrity signals
  aiScores = null, // optional per-review upstream AI-detector probabilities
  ring = null, // { ids:[...shared global "ring_*" ids], count:N } → first N reviews
  // are a time-locked lockstep cluster by shared accounts co-reviewing venues
  spike = null // { count:M, withinDays:D, rating:R } → M recent inflated reviews
  // from fresh accounts clustered in the last D days (rating-manipulation)
}) {
  const reviews = [];
  const localN = Math.round(count * localRatio);
  const repeatN = Math.round(count * repeatRatio);
  for (let i = 0; i < count; i++) {
    const isRing = ring && i < ring.count;
    const author = isRing ? ring.ids[i % ring.ids.length] : `u${i % authors}`;
    // Ring reviews cluster in a tight recent window so they lockstep across
    // venues; genuine reviews spread evenly across the venue's history.
    const daysAgo = isRing
      ? 6 + ((i % ring.ids.length) * 3)
      : count > 1 ? Math.round((spanDays * (count - 1 - i)) / (count - 1)) : 0;
    reviews.push({
      platform: platforms[i % platforms.length],
      author,
      daysAgo,
      rating: ratings[i % ratings.length],
      paid: i < paid,
      markers: i < paid ? ["협찬", "#광고"] : [],
      local: !isRing && i % count < localN,
      repeat: !isRing && i % count < repeatN,
      specificity: Math.max(0.1, Math.min(1, specificity + (((i % 3) - 1) * 0.05))),
      ...(texts ? { text: texts[i % texts.length] } : {}),
      ...(aiScores ? { ai: aiScores[i % aiScores.length] } : {})
    });
  }
  if (spike) {
    for (let k = 0; k < spike.count; k++) {
      reviews.push({
        platform: platforms[k % platforms.length],
        author: `s${1000 + k}`, // fresh accounts, distinct from the history
        daysAgo: 2 + (k % Math.max(1, spike.withinDays)),
        rating: spike.rating ?? 5,
        paid: false,
        markers: [],
        local: false,
        repeat: false,
        specificity: 0.3
      });
    }
  }
  return reviews;
}

// Namespace genuine (venue-local) author ids by venue so honest reviewers never
// look like the same person across venues; shared "ring_*" ids are left intact
// so the corpus ring detector can catch cross-venue lockstep collusion.
function namespaceAuthors(restaurants) {
  for (const r of restaurants) {
    for (const rev of r.reviews ?? []) {
      if (!String(rev.author).startsWith("ring_")) rev.author = `${r.id}_${rev.author}`;
    }
  }
  return restaurants;
}

  // situations
  $("situations").innerHTML = "";
  SITUATIONS.forEach((s) => { const b = document.createElement("button"); b.type = "button"; b.className = "sit"; b.innerHTML = `<span class="emo">${s.emo}</span><span class="lb">${s.lb}</span>`; b.onclick = () => pickSituation(s, b); $("situations").appendChild(b); });
  // categories (multi-select place style)
  const cats = ["전체", ...m.styles];
  $("cats").innerHTML = "";
  cats.forEach((c) => { const b = document.createElement("button"); b.type = "button"; b.className = "cat" + (c === "전체" ? " on" : ""); b.dataset.cat = c; b.textContent = c === "전체" ? "전체" : `${catOf(c)[0]} ${c}`; b.onclick = () => toggleCat(c); $("cats").appendChild(b); });

  $("near").innerHTML = m.landmarks.map((l) => `<option>${l}</option>`).join("");
  $("menu").insertAdjacentHTML("beforeend", m.menus.map((x) => `<option>${x}</option>`).join(""));
  syncPills();

  $("locChip").onclick = () => openSheet("sheetLoc");
  $("infoBtn").onclick = () => openSheet("sheetInfo");
  $("closeInfo").onclick = closeSheets;
  $("openFilter").onclick = () => openSheet("sheetFilter");
  $("closeFilter").onclick = $("applyFilter").onclick = closeSheets;
  $("scrim").onclick = closeSheets;
  document.querySelectorAll(".grip").forEach((g) => (g.onclick = closeSheets));
  $("minutes").oninput = (e) => ($("minsOut").textContent = e.target.value);
  $("menu").onchange = () => { clearSituation(); run(); };
  $("gemOnly").onchange = (e) => { state.gemOnly = e.target.checked; run(); };
  $("resetFilter").onclick = () => { clearFilters(); clearSituation(); run(); };
  $("applyLoc").onclick = () => { closeSheets(); syncLoc(); run(); };
  $("useGeo").onclick = useGeo;
  $("verifiedSeg").querySelectorAll("button").forEach((b) => (b.onclick = () => { state.mode = b.dataset.mode; $("verifiedSeg").querySelectorAll("button").forEach((x) => x.classList.toggle("on", x === b)); run(); }));
  $("sortSeg").querySelectorAll("button").forEach((b) => (b.onclick = () => { state.sort = b.dataset.sort; $("sortSeg").querySelectorAll("button").forEach((x) => x.classList.toggle("on", x === b)); run(); }));

  syncLoc(); run();
}

function toggleCat(c) {
  if (c === "전체") state.cats.clear();
  else { state.cats.has(c) ? state.cats.delete(c) : state.cats.add(c); }
  $("cats").querySelectorAll(".cat").forEach((b) => { const cc = b.dataset.cat; b.classList.toggle("on", cc === "전체" ? state.cats.size === 0 : state.cats.has(cc)); });
  clearSituation(); run();
}
function clearFilters() {
  state.gemOnly = false; $("gemOnly").checked = false;
  Object.values(state.sel).forEach((s) => s.clear()); state.prefer = []; state.preferFeatures = []; $("menu").value = "";
  syncPills();
}
function clearSituation() { if (state.situation) { state.situation = null; $("situations").querySelectorAll(".sit").forEach((b) => b.classList.remove("on")); } }
function pickSituation(s, btn) {
  const was = state.situation === s.key;
  clearFilters();
  $("situations").querySelectorAll(".sit").forEach((b) => b.classList.remove("on"));
  if (was) { state.situation = null; run(); return; }
  state.situation = s.key; btn.classList.add("on");
  (s.require || []).forEach((f) => state.sel.features.add(f));
  (s.tags || []).forEach((t) => state.sel.tags.add(t));
  state.preferFeatures = s.prefFeat || []; state.prefer = s.pref || [];
  syncPills(); run();
}

function syncLoc() {
  if (!$("useLocation").checked) { state.location = null; $("locName").textContent = "전국"; return; }
  if (state.location && state.location.lat != null) $("locName").textContent = "현재위치";
  else { state.location = { near: $("near").value }; $("locName").textContent = $("near").value; }
}
function useGeo() {
  if (!navigator.geolocation) return alert("이 기기에서 위치를 쓸 수 없어요.");
  $("useGeo").textContent = "위치 확인 중…";
  navigator.geolocation.getCurrentPosition((p) => { state.location = { lat: p.coords.latitude, lng: p.coords.longitude }; $("useGeo").textContent = "📍 현재 위치 사용됨 ✓"; $("useLocation").checked = true; }, () => { $("useGeo").textContent = "📍 내 현재 위치 사용"; alert("위치 권한이 필요해요."); });
}

function buildQuery(extra = {}) {
  const pb = [...state.sel.priceBands];
  const q = {
    styles: [...state.cats], cuisines: [...state.sel.cuisines], tagsAny: [...state.sel.tags],
    menuAttrs: [...state.sel.menuAttrs], require: Object.fromEntries([...state.sel.features].map((f) => [f, true])),
    prefer: state.prefer, preferFeatures: Object.fromEntries((state.preferFeatures || []).map((f) => [f, true])),
    priceMin: pb.length ? Math.min(...pb) : 1, priceMax: pb.length ? Math.max(...pb) : 4,
    includeUnverified: state.mode === "all"
  };
  if ($("menu").value) q.menu = $("menu").value;
  if ($("useLocation").checked) { q.location = state.location && state.location.lat != null ? state.location : { near: $("near").value }; q.travel = { mode: $("mode").value, minutes: +$("minutes").value }; }
  return { ...q, ...extra };
}
async function apiSearch(q) { return (await (await fetch("/api/search", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(q) })).json()); }
function postProcess(data) {
  let rows = data.results.slice();
  if (state.gemOnly) rows = rows.filter((r) => r.verdict === "찐맛집");
  if (state.sort === "rating") rows.sort((a, b) => b.rating - a.rating);
  else if (state.sort === "distance") rows.sort((a, b) => (a.distanceKm ?? 1e9) - (b.distanceKm ?? 1e9));
  return rows;
}

async function run() {
  const data = await apiSearch(buildQuery());
  const rows = postProcess(data);
  state.last = { meta: data.meta, rows };
  renderApplied(); renderCount(data.meta, rows.length);
  $("applyFilter").textContent = `결과 ${rows.length}곳 보기`;
  if (!rows.length) return renderEmpty();
  $("list").innerHTML = rows.map(cardHtml).join("");
  [...$("list").children].forEach((el, i) => (el.onclick = () => openDetail(rows[i])));
}
function renderCount(meta, n) {
  const where = meta.origin ? `${$("locName").textContent} 근처` : "전국";
  $("count").textContent = `${where} ${state.gemOnly ? "🔥 찐맛집" : meta.verifiedOnly ? "검증 맛집" : "전체"} ${n}곳`;
}

function activeFilters() {
  const a = [];
  state.sel.cuisines.forEach((c) => a.push({ label: c, rm: () => state.sel.cuisines.delete(c) }));
  state.sel.priceBands.forEach((p) => a.push({ label: BAND[p], rm: () => state.sel.priceBands.delete(p) }));
  state.sel.features.forEach((f) => a.push({ label: (FEATURE_LABEL[f] || f).replace(/^\S+\s/, ""), rm: () => state.sel.features.delete(f) }));
  state.sel.tags.forEach((t) => a.push({ label: t, rm: () => state.sel.tags.delete(t) }));
  state.sel.menuAttrs.forEach((t) => a.push({ label: t, rm: () => state.sel.menuAttrs.delete(t) }));
  if ($("menu").value) a.push({ label: $("menu").value, rm: () => ($("menu").value = "") });
  if (state.gemOnly) a.push({ label: "🔥 찐맛집만", rm: () => { state.gemOnly = false; $("gemOnly").checked = false; } });
  return a;
}
function renderApplied() {
  const a = activeFilters(), el = $("applied");
  if (!a.length) { el.hidden = true; el.innerHTML = ""; return; }
  el.hidden = false;
  el.innerHTML = a.map((f, i) => `<button class="achip" data-i="${i}">${f.label} <span class="x">×</span></button>`).join("") + `<button class="achip reset" id="resetAll">전체 해제</button>`;
  a.forEach((f, i) => (el.querySelector(`[data-i="${i}"]`).onclick = () => { f.rm(); clearSituation(); syncPills(); run(); }));
  $("resetAll").onclick = () => { clearFilters(); clearSituation(); run(); };
}

// Build "remove one facet" candidates WITHOUT mutating state (each carries an
// apply() that performs the real removal only when the user taps it).
function relaxCandidates() {
  const base = buildQuery(), c = [];
  [...state.sel.cuisines].forEach((x) => c.push({ label: x, q: { ...base, cuisines: base.cuisines.filter((v) => v !== x) }, apply: () => state.sel.cuisines.delete(x) }));
  [...state.sel.tags].forEach((x) => c.push({ label: x, q: { ...base, tagsAny: base.tagsAny.filter((v) => v !== x) }, apply: () => state.sel.tags.delete(x) }));
  [...state.sel.features].forEach((f) => { const req = { ...base.require }; delete req[f]; c.push({ label: (FEATURE_LABEL[f] || f).replace(/^\S+\s/, ""), q: { ...base, require: req }, apply: () => state.sel.features.delete(f) }); });
  [...state.sel.menuAttrs].forEach((x) => c.push({ label: x, q: { ...base, menuAttrs: base.menuAttrs.filter((v) => v !== x) }, apply: () => state.sel.menuAttrs.delete(x) }));
  if (state.sel.priceBands.size) c.push({ label: "가격대 넓히기", q: { ...base, priceMin: 1, priceMax: 4 }, apply: () => state.sel.priceBands.clear() });
  if ($("menu").value) c.push({ label: $("menu").value, q: { ...base, menu: undefined }, apply: () => ($("menu").value = "") });
  if (state.cats.size) c.push({ label: "장소 종류", q: { ...base, styles: [] }, apply: () => { state.cats.clear(); refreshCats(); } });
  if ($("useLocation").checked && +$("minutes").value < 60) c.push({ label: "이동 범위 넓히기", q: { ...base, travel: { mode: $("mode").value, minutes: Math.min(60, +$("minutes").value + 15) } }, apply: () => { $("minutes").value = Math.min(60, +$("minutes").value + 15); $("minsOut").textContent = $("minutes").value; syncLoc(); } });
  if (state.gemOnly) c.push({ label: "🔥 찐맛집만 해제", q: base, gem: false, apply: () => { state.gemOnly = false; $("gemOnly").checked = false; } });
  return c;
}
async function countFor(c) {
  const data = await apiSearch(c.q);
  const gem = c.gem === false ? false : state.gemOnly;
  return (gem ? data.results.filter((r) => r.verdict === "찐맛집") : data.results).length;
}
async function renderEmpty() {
  const cands = relaxCandidates(), scored = [];
  for (const c of cands) { const n = await countFor(c); if (n > 0) scored.push({ ...c, n }); }
  scored.sort((a, b) => b.n - a.n);
  const top = scored.slice(0, 4);
  const relax = top.length
    ? `<div class="relax">${top.map((s, i) => `<button data-i="${i}">${s.label} 빼면 <b>${s.n}곳</b></button>`).join("")}</div>`
    : `<div class="relax"><button id="relaxReset">필터 초기화</button></div>`;
  $("list").innerHTML = `<div class="empty">조건에 맞는 ${state.gemOnly ? "찐맛집" : state.mode === "verified" ? "검증된 " : ""}맛집이 없어요.<br>${top.length ? "아래 조건을 하나만 풀어볼까요?" : "필터를 초기화해 보세요."}</div>${relax}`;
  top.forEach((s, i) => ($("list").querySelector(`.relax [data-i="${i}"]`).onclick = () => { s.apply(); clearSituation(); syncPills(); run(); }));
  if (!top.length) $("relaxReset").onclick = () => { clearFilters(); clearSituation(); run(); };
  renderApplied();
}
function refreshCats() { $("cats").querySelectorAll(".cat").forEach((b) => { const cc = b.dataset.cat; b.classList.toggle("on", cc === "전체" ? state.cats.size === 0 : state.cats.has(cc)); }); }

function cardHtml(r) {
  const [emo, bg] = catOf(r.style);
  const badge = r.verdict === "찐맛집" ? `<span class="badge b-gem">🔥 찐맛집</span>` : r.verified ? `<span class="badge b-ok">✓ 검증</span>` : `<span class="badge b-bad">주의</span>`;
  const dist = r.distanceKm != null ? `${r.distanceKm}km · ` : "";
  let reason;
  if (r.verified) { const t = cardReason(r); reason = t ? `<div class="creason">${t[0]} ${t[1]}</div>` : ""; }
  else reason = `<div class="creason warn">⚠️ ${VERDICT_MSG[r.verdict] || "검증되지 않은 곳이에요"}</div>`;
  return `<button class="card" type="button"><div class="thumb" style="background:${bg}">${emo}</div><div class="cbody"><div class="crow"><span class="cname">${r.name}</span>${badge}</div><div class="csub">${r.style} · ${dist}⭐ ${r.rating} · ${"₩".repeat(r.priceBand)}</div>${reason}</div><span class="chev">›</span></button>`;
}
function openDetail(r) {
  const [emo, bg] = catOf(r.style);
  const dist = r.distanceKm != null ? ` · ${r.distanceKm}km(${r.travelMinutes}분)` : "";
  const badge = r.verdict === "찐맛집" ? `<span class="badge b-gem">🔥 찐맛집</span>` : r.verified ? `<span class="badge b-ok">✓ 검증됨</span>` : `<span class="badge b-bad">${r.verdict}</span>`;
  const lines = r.verified ? trustLines(r) : [["⚠️", VERDICT_MSG[r.verdict] || "검증 신호가 부족해요"], ...(r.reasons || []).filter((x) => x.startsWith("⚠")).map((x) => ["", x.replace(/^⚠\s*/, "")])];
  const trust = `<ul class="trust ${r.verified ? "" : "warn"}">${lines.map(([ic, t]) => `<li><span class="ic">${ic}</span><span>${t}</span></li>`).join("")}</ul>`;
  const menus = (r.menus || []).map((m) => `<span class="tagpill">${m.name}${m.attrs?.length ? " " + m.attrs.join("·") : ""}</span>`).join("");
  const feats = Object.entries(r.features || {}).filter(([, v]) => v).map(([k]) => (FEATURE_LABEL[k] || k));
  const facts = [...(r.tags || []), ...feats].map((t) => `<span>${t}</span>`).join("");
  $("detailBody").innerHTML = `<div class="dt-head"><div class="thumb" style="background:${bg}">${emo}</div><div><div class="crow"><span class="dt-name">${r.name}</span>${badge}</div><div class="dt-sub">${r.style} · ⭐ ${r.rating} · ${"₩".repeat(r.priceBand)}${dist}</div></div></div>
    <div class="sec"><h3>${r.verified ? "왜 믿을 만한가요" : "왜 조심해야 하나요"}</h3>${trust}</div>
    ${menus ? `<div class="sec"><h3>대표 메뉴</h3><div class="menus">${menus}</div></div>` : ""}
    ${facts ? `<div class="sec"><h3>이런 곳이에요</h3><div class="facts">${facts}</div></div>` : ""}
    <div class="sec"><div class="dt-sub">📍 ${r.address}</div><div class="dt-sub" style="margin-top:6px">영업시간·전화·길찾기는 네이버지도에서 확인하세요.</div></div>`;
  $("detailActions").innerHTML = `<a class="btn btn-primary" href="${naverUrl(r)}" target="_blank" rel="noopener">네이버지도 열기</a><button class="btn btn-line" type="button" id="closeDetail">닫기</button>`;
  $("closeDetail").onclick = closeSheets;
  openSheet("sheetDetail");
}

init();

</script>
