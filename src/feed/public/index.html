<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>내 취향 피드</title>
<link rel="manifest" href="/manifest.webmanifest" />
<meta name="theme-color" content="#0e0f13" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="취향피드" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/icon.svg" />
<style>
  :root {
    --bg: #0e0f13;
    --card: #171922;
    --card-2: #1e202b;
    --line: #262a37;
    --text: #e8eaf0;
    --muted: #8a90a2;
    --accent: #4f8cff;
    --like: #3fb27f;
    --dislike: #e5566b;
    --radius: 16px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
  body { max-width: 720px; margin: 0 auto; padding-bottom: 40px; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; }

  /* header */
  header { position: sticky; top: 0; z-index: 20; background: rgba(14,15,19,.9);
    backdrop-filter: blur(10px); border-bottom: 1px solid var(--line);
    padding: 12px 16px calc(10px + env(safe-area-inset-top)); }
  .brand { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 18px; }
  .brand small { font-weight: 500; color: var(--muted); font-size: 12px; }
  .adult-btn { margin-left: auto; width: 34px; height: 26px; border-radius: 8px; font-weight: 800; font-size: 13px;
    border: 1px solid var(--line); background: var(--card-2); color: var(--muted); position: relative; }
  .adult-btn.locked::after { content: "🔒"; position: absolute; top: -7px; right: -7px; font-size: 11px; }
  .adult-btn.on { background: var(--dislike); border-color: var(--dislike); color: #fff; }
  .badge.adult { color: #fff; background: var(--dislike); }
  .badge.trans { color: #0e0f13; background: #39c0d3; }
  .adult-btn.on#immBtn, #immBtn.on { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ---------- hamburger menu + drawer (David 2026-07-24: home = feed only) ---------- */
  .menu-btn { margin-left: auto; width: 36px; height: 32px; border-radius: 9px; border: 1px solid var(--line);
    background: var(--card-2); color: var(--text); font-size: 17px; line-height: 1; display: flex;
    align-items: center; justify-content: center; }
  .hot-tag { font-size: 11px; font-weight: 800; color: #f0a13d; background: rgba(240,161,61,.14);
    border: 1px solid rgba(240,161,61,.32); border-radius: 999px; padding: 3px 9px; margin-left: 8px; white-space: nowrap; }

  .drawer-back { position: fixed; inset: 0; z-index: 48; background: rgba(0,0,0,.5); opacity: 0;
    pointer-events: none; transition: opacity .2s ease; }
  .drawer-back.open { opacity: 1; pointer-events: auto; }
  .drawer { position: fixed; top: 0; left: 0; bottom: 0; width: min(86vw, 340px); background: var(--card);
    border-right: 1px solid var(--line); z-index: 49; transform: translateX(-100%);
    transition: transform .22s ease; overflow-y: auto; }
  .drawer.open { transform: translateX(0); }
  .drawer-head { position: sticky; top: 0; background: var(--card); display: flex; align-items: center;
    gap: 10px; padding: calc(14px + env(safe-area-inset-top)) 16px 12px; border-bottom: 1px solid var(--line); z-index: 2; }
  .drawer-title { font-weight: 800; font-size: 16px; flex: 1; }
  .drawer-close { background: none; border: none; color: var(--muted); font-size: 20px; padding: 4px 6px; }
  .drawer-body { padding: 14px 16px calc(24px + env(safe-area-inset-bottom)); }
  .drawer-row { display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 10px 0; font-size: 13.5px; }
  .drawer-sec { margin-top: 20px; }
  .drawer-sec h4 { margin: 0 0 10px; font-size: 12px; color: var(--muted); font-weight: 800;
    text-transform: uppercase; letter-spacing: .03em; }
  .drawer-link { width: 100%; text-align: left; background: var(--card-2); border: 1px solid var(--line);
    color: var(--text); border-radius: 12px; padding: 12px 14px; font-size: 14px; font-weight: 700; }

  /* 몰입 모드: 한 글씩 세로 스와이프 (틱톡식 포맷, 콘텐츠는 글) */
  body.immersion { max-width: 100%; }
  body.immersion .fab { display: none; }
  body.immersion #feed { scroll-snap-type: y mandatory; height: calc(100vh - var(--header-h, 60px)); overflow-y: auto; padding: 0; }
  body.immersion .card { scroll-snap-align: start; min-height: calc(100vh - var(--header-h, 60px)); margin: 0; border-radius: 0;
    border-left: none; border-right: none; display: flex; flex-direction: column; justify-content: center; padding: 30px 24px; }
  body.immersion .card h3 { font-size: 24px; line-height: 1.45; margin-bottom: 14px; }
  body.immersion .card p { font-size: 16px; line-height: 1.7; -webkit-line-clamp: 8; }
  body.immersion .card-meta { margin-top: 22px; }
  body.immersion .card.read::after { content: ""; }
  body.immersion .actions .rate { padding: 10px 14px; font-size: 16px; }

  /* floating action bar */
  .fab { position: fixed; right: 16px; bottom: calc(20px + env(safe-area-inset-bottom)); z-index: 30; display: flex; flex-direction: column; gap: 10px; }
  .fab button { width: 52px; height: 52px; border-radius: 50%; border: none; font-size: 22px; color: #fff;
    box-shadow: 0 6px 18px rgba(0,0,0,.4); }
  .fab .compose { background: var(--accent); }
  @media (min-width: 720px){ .fab { right: calc(50% - 360px + 16px); } }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12.5px; color: var(--muted); margin-bottom: 5px; }
  .field input, .field textarea, .field select { width: 100%; background: var(--card-2); border: 1px solid var(--line);
    color: var(--text); border-radius: 10px; padding: 10px 11px; font-size: 14px; }
  .field textarea { min-height: 90px; resize: vertical; }
  .space-stats { display: flex; gap: 8px; margin-bottom: 18px; }
  .stat { flex: 1; background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 12px; text-align: center; }
  .stat b { display: block; font-size: 20px; }
  .stat span { font-size: 11.5px; color: var(--muted); }
  .space-sec h4 { margin: 18px 0 10px; font-size: 15px; }
  .level-banner { background: linear-gradient(135deg, #1e2740, #171922); border: 1px solid var(--line);
    border-radius: 14px; padding: 14px 16px; margin-bottom: 16px; }
  .lvbar { height: 6px; border-radius: 6px; background: var(--card-2); overflow: hidden; margin-top: 8px; }
  .lvfill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--like)); }
  .norm-hint { font-size: 12px; color: #f0a13d; margin-top: 8px; line-height: 1.5; }
  .readmore { display: block; text-align: center; background: var(--accent); color: #fff !important;
    border-radius: 12px; padding: 14px; font-weight: 700; font-size: 15px; margin: 4px 0 8px; }
  .excerpt-note { text-align: center; color: var(--muted); font-size: 11.5px; margin-bottom: 14px; }
  .reasons { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .why { font-size: 11px; color: #9fd0ff; background: rgba(79,140,255,.12); border: 1px solid rgba(79,140,255,.25);
    border-radius: 999px; padding: 3px 9px; }
  .why::before { content: "✓ "; opacity: .8; }
  .taste-grid { margin-bottom: 6px; }
  .taste-row { margin-bottom: 12px; }
  .taste-row .tlabel { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .bar { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 13px; }
  .bar .name { width: 92px; flex: 0 0 auto; }
  .bar .track { flex: 1; height: 8px; background: var(--card-2); border-radius: 6px; overflow: hidden; }
  .bar .fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--like)); }
  .bar.neg .fill { background: var(--dislike); }

  .modal-back { position: fixed; inset: 0; z-index: 70; background: rgba(0,0,0,.6); display: flex;
    align-items: center; justify-content: center; padding: 24px; }
  .modal { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 22px; max-width: 380px; width: 100%; }
  .modal h3 { margin: 0 0 10px; font-size: 18px; }
  .modal p { margin: 0 0 18px; color: var(--muted); font-size: 13.5px; line-height: 1.6; }
  .modal .row { display: flex; gap: 10px; }
  .modal button { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 700; font-size: 14px; }
  .modal .confirm { background: var(--dislike); color: #fff; }
  .modal .cancel { background: var(--card-2); color: var(--text); border: 1px solid var(--line); }
  .meter { margin-top: 10px; }
  .meter-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .meter-bar { height: 6px; border-radius: 6px; background: var(--card-2); overflow: hidden; }
  .meter-fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--like)); transition: width .4s ease; }

  .chips { display: flex; gap: 8px; overflow-x: auto; padding: 2px 0 4px; margin: 0; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  /* source-select chip bar ("전체" + per-community/news chips, jagei-style board view) —
     lives inside the ☰ drawer now (David 2026-07-24: home is the unified hot
     feed only), so it's just a normal horizontal-scroll row, not sticky. */
  .src-chips { display: flex; gap: 8px; overflow-x: auto; padding: 2px 0 4px; margin: 0; scrollbar-width: none; }
  .src-chips::-webkit-scrollbar { display: none; }
  .src-chip { flex: 0 0 auto; padding: 7px 13px; border-radius: 999px; border: 1px solid var(--line);
    background: var(--card-2); color: var(--muted); font-size: 13px; font-weight: 700; white-space: nowrap; }
  .src-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  /* link-submission entry point is an action, not a filter toggle — visually
     distinct (accent outline) from the source chips beside it */
  .src-chip#submitLinkBtn { border-color: var(--accent); color: var(--accent); font-weight: 800; }
  .chip { flex: 0 0 auto; padding: 7px 13px; border-radius: 999px; border: 1px solid var(--line);
    background: var(--card); color: var(--muted); font-size: 13px; }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* feed */
  #feed { padding: 8px 12px 0; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px 15px; margin-bottom: 12px; transition: transform .08s ease; }
  .card:active { transform: scale(.992); }
  .card-top { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
  .src { font-weight: 600; color: #c3c8d6; }
  .badge { margin-left: auto; font-size: 11px; padding: 2px 8px; border-radius: 999px;
    background: var(--card-2); color: var(--muted); }
  .badge.news { color: #7fb0ff; }
  .card h3 { margin: 0 0 6px; font-size: 16px; line-height: 1.4; font-weight: 700; }
  .card p { margin: 0; color: var(--muted); font-size: 13.5px; line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-meta { display: flex; align-items: center; gap: 14px; margin-top: 11px; font-size: 12.5px; color: var(--muted); }
  /* dedicated in-app-detail entry point (comments etc.) — the card body itself
     now leaves to the original for collected items, so this chip is the way in */
  .card-meta .open-detail { cursor: pointer; }
  .card-meta .open-detail:hover, .card-meta .open-detail:focus-visible { color: var(--text); }
  .actions { margin-left: auto; display: flex; gap: 8px; }
  .rate { border: 1px solid var(--line); background: var(--card-2); color: var(--muted);
    border-radius: 10px; padding: 10px 14px; min-height: 42px; font-size: 14px;
    display: flex; align-items: center; gap: 5px; } /* ≥42px hit target for thumbs */
  .rate.up.on { color: #fff; background: var(--like); border-color: var(--like); }
  .rate.down.on { color: #fff; background: var(--dislike); border-color: var(--dislike); }
  .rate.save.on { color: #f0a13d; border-color: #f0a13d; }
  .card.read { opacity: .5; }
  .card.read h3 { color: var(--muted); }
  .card.read::after { content: "읽음"; float: right; font-size: 10px; color: var(--muted); }
  .mute-btn { margin-left: auto; background: none; border: 1px solid var(--line); color: var(--muted);
    border-radius: 8px; padding: 5px 10px; font-size: 12px; }
  .muted-row { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--line);
    border-radius: 10px; padding: 9px 12px; margin-bottom: 8px; font-size: 13px; }
  .muted-row button { margin-left: auto; background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 5px 11px; font-size: 12px; }

  .sentinel { height: 40px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--line); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* detail overlay */
  #detail { position: fixed; inset: 0; z-index: 40; background: var(--bg); overflow-y: auto;
    max-width: 720px; margin: 0 auto; transform: translateX(100%); transition: transform .22s ease; }
  #detail.open { transform: translateX(0); }

  .detail-head { position: sticky; top: 0; background: rgba(14,15,19,.92); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line); padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
    display: flex; align-items: center; gap: 12px; }
  .back { font-size: 22px; line-height: 1; background: none; border: none; color: var(--text); padding: 4px 6px; }
  .detail-body { padding: 18px 18px 60px; }
  .detail-body h2 { margin: 0 0 12px; font-size: 21px; line-height: 1.35; }
  .detail-body .full { color: #c9cedd; font-size: 15px; line-height: 1.7; margin: 0 0 20px; }
  .detail-actions { display: flex; gap: 10px; margin: 18px 0 24px; }
  .detail-actions .rate { flex: 1; justify-content: center; padding: 11px; font-size: 15px; }

  .comments h4 { margin: 0 0 12px; font-size: 15px; }
  .comment { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 11px 13px; margin-bottom: 10px; }
  .comment .who { font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .comment .txt { font-size: 14px; line-height: 1.55; }
  .comment-form { display: flex; gap: 8px; margin: 8px 0 20px; }
  .comment-form textarea { flex: 1; resize: none; background: var(--card); border: 1px solid var(--line);
    color: var(--text); border-radius: 12px; padding: 11px 12px; font-size: 14px; min-height: 44px; }
  .comment-form button { background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 0 16px; font-weight: 600; }

  /* survey */
  #survey { position: fixed; inset: 0; z-index: 60; background: var(--bg); overflow-y: auto; max-width: 720px; margin: 0 auto; }
  .survey-inner { padding: calc(28px + env(safe-area-inset-top)) 20px 40px; }
  .survey-inner h1 { font-size: 24px; margin: 0 0 6px; }
  .survey-inner .lead { color: var(--muted); font-size: 14px; margin: 0 0 26px; line-height: 1.6; }
  .q { margin-bottom: 26px; }
  .q > .prompt { font-weight: 700; font-size: 15px; margin-bottom: 12px; }
  .opts { display: flex; flex-wrap: wrap; gap: 8px; }
  .opt { padding: 9px 14px; border-radius: 12px; border: 1px solid var(--line); background: var(--card);
    color: var(--text); font-size: 14px; }
  .opt.sel { background: var(--accent); border-color: var(--accent); color: #fff; }
  .start { position: sticky; bottom: 0; width: 100%; padding: 15px; margin-top: 10px; font-size: 16px;
    font-weight: 700; border: none; border-radius: 14px; background: var(--accent); color: #fff; }
  .start:disabled { opacity: .4; }
  .warmstart { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 26px; }
  .warmstart .prompt { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
  .warmstart textarea { width: 100%; min-height: 92px; resize: vertical; background: var(--card-2);
    border: 1px solid var(--line); color: var(--text); border-radius: 10px; padding: 10px 11px; font-size: 13.5px; line-height: 1.5; }
  .hidden { display: none !important; }
  .toast { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); background: #222634;
    border: 1px solid var(--line); color: var(--text); padding: 10px 18px; border-radius: 999px; font-size: 13px;
    z-index: 80; opacity: 0; transition: opacity .25s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .digest { margin: 10px 12px 0; padding: 12px 14px; border-radius: 14px; display: flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, rgba(79,140,255,.16), rgba(63,178,127,.12)); border: 1px solid rgba(79,140,255,.3); }
  .digest .dtext { flex: 1; font-size: 13.5px; line-height: 1.45; }
  .digest .dtext b { color: #9fd0ff; }
  .digest button { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 8px 12px; font-size: 12.5px; font-weight: 600; white-space: nowrap; }
  .digest .dclose { background: none; color: var(--muted); padding: 6px; font-size: 16px; }

  /* ---------- Desktop / PC (mobile-first above; the layout is the same single
     centered column at every width now that the source chips / filters /
     my-space live in the ☰ drawer instead of an always-visible sidebar —
     David 2026-07-24: home is one clean feed everywhere, not just on mobile) ---------- */
  @media (min-width: 1000px) {
    .card:hover { border-color: #33405e; }
    /* detail overlay: on wide screens hide via visibility (the slide-off transform doesn't fully clear a centered panel once the viewport is much wider than it) */
    #detail { transition: opacity .15s ease; transform: none; visibility: hidden; opacity: 0; }
    #detail.open { transform: none; visibility: visible; opacity: 1; }
  }
</style>
</head>
<body>
  <header>
    <div class="brand">🧭 내 취향 피드 <small id="phaseLabel">준비 중</small>
      <span class="hot-tag">🔥 지금 핫</span>
      <button id="menuBtn" class="menu-btn" title="메뉴" aria-label="메뉴 열기" aria-expanded="false" aria-controls="drawer">☰</button>
    </div>
  </header>

  <!-- 홈은 통합 핫 피드 하나만 — 소스별 선택 칩·필터 토글·내 공간·제출은 전부
       여기 드로어 안으로 이동(삭제 아님). ☰로 열고 닫는다 (David 2026-07-24). -->
  <div class="drawer-back" id="drawerBack"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-head">
      <div class="drawer-title">메뉴</div>
      <button class="drawer-close" id="drawerClose" aria-label="메뉴 닫기">✕</button>
    </div>
    <div class="drawer-body">
      <div class="meter">
        <div class="meter-label"><span>취향 정확도</span><span id="levelPct">0%</span></div>
        <div class="meter-bar"><div class="meter-fill" id="levelFill"></div></div>
      </div>

      <div class="drawer-row">
        <span>🎬 몰입 모드 (한 글씩 넘겨보기)</span>
        <button id="immBtn" class="adult-btn" title="몰입 모드">🎬</button>
      </div>

      <div class="drawer-sec">
        <h4>카테고리</h4>
        <div class="chips" id="chips"></div>
      </div>

      <div class="drawer-sec">
        <h4>소스별 보기 · 링크 제출</h4>
        <div class="src-chips" id="srcChips"></div>
      </div>

      <div class="drawer-sec">
        <h4>콘텐츠 필터</h4>
        <div id="drawerFilters"></div>
      </div>

      <div class="drawer-sec">
        <button class="drawer-link" id="drawerSpaceBtn">👤 내 공간</button>
      </div>
    </div>
  </aside>

  <div id="digestBar" class="digest hidden"></div>

  <main id="feed"></main>
  <div class="sentinel" id="sentinel"></div>

  <div class="fab" id="fab">
    <button class="compose" id="composeBtn" title="글쓰기">✍️</button>
  </div>

  <!-- my space -->
  <section id="space" class="hidden" style="position:fixed;inset:0;z-index:45;background:var(--bg);overflow-y:auto;max-width:720px;margin:0 auto">
    <div class="detail-head">
      <button class="back" id="spaceBack" aria-label="뒤로">‹</button>
      <div class="src">👤 내 공간</div>
    </div>
    <div class="detail-body" id="spaceBody"></div>
  </section>

  <!-- post detail -->
  <section id="detail" aria-hidden="true">
    <div class="detail-head">
      <button class="back" id="backBtn" aria-label="뒤로">‹</button>
      <div class="src" id="detailSrc"></div>
      <button class="mute-btn" id="shareBtn" style="margin-left:8px">🔗 공유</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </section>

  <!-- onboarding survey -->
  <section id="survey" class="hidden">
    <div class="survey-inner">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:2px">
        <h1 style="margin:0;flex:1">취향을 알려주세요</h1>

      </div>
      <p class="lead">관심 주제만 톡톡 고르면 그에 맞는 글을 모아드려요. 좋아요/싫어요로 계속 정확해집니다.</p>

      <div id="questions"></div>

      <details class="warmstart" style="margin-top:4px">
        <summary style="cursor:pointer;font-weight:700;font-size:14px;list-style:none">＋ 방문기록으로 더 정확하게 <span style="color:var(--muted);font-weight:400">(선택)</span></summary>
        <p style="color:var(--muted);font-size:12.5px;line-height:1.6;margin:10px 0 10px">
          자주 가는 커뮤니티 주소나 봤던 글 제목을 붙여넣으면 초반 취향을 자동으로 유추해요. 도메인·제목만 사용하고 저장하지 않습니다.</p>
        <textarea id="histInput" placeholder="예)&#10;bobae.co.kr&#10;clien.net&#10;신형 그랜저 시승기"></textarea>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="opt" id="histSample" type="button">샘플 넣기</button>
          <button class="opt" id="histApply" type="button">이 기록으로 유추</button>
          <span id="histResult" style="align-self:center;font-size:12.5px;color:var(--like)"></span>
        </div>
      </details>

      <button class="start" id="startBtn" disabled>이 취향으로 시작하기</button>
    </div>
  </section>

  <div class="toast" id="toast"></div>

<script type="module">
const API = {
  async session(userId) { return post("/api/session", { userId }); },
  async config() { return get("/api/config"); },
  async communities() { return get("/api/communities"); },
  async rules() { return get("/api/rules"); },
  async saveSurvey(userId, answers) { return post("/api/survey", { userId, answers }); },
  async history(userId, entries) { return post("/api/history", { userId, entries }); },
  async verifyAge(userId) { return post("/api/verify-age", { userId, confirmAdult: true }); },
  async setAdult(userId, on) { return post("/api/adult", { userId, on }); },
  async createPost(userId, p) { return post("/api/post", { userId, ...p }); },
  async submitLink(userId, url, opts={}) { return post("/api/submit", { userId, url, ...opts }); },
  async mySpace(userId) { return get(`/api/me?userId=${userId}`); },
  async save(userId, itemId, on) { return post("/api/save", { userId, itemId, on }); },
  async signal(userId, itemId, type, dwellMs) { return post("/api/signal", { userId, itemId, type, dwellMs }).catch(()=>{}); },
  async digest(userId) { return get(`/api/digest?userId=${userId}&limit=5`); },
  async subscribePush(userId, subscription) { return post("/api/push/subscribe", { userId, subscription }); },
  async vapidKey() { return get("/api/push/vapid-key"); },
  async mute(userId, source, on) { return post("/api/mute", { userId, source, on }); },
  async setTopic(userId, topic, on) { return post("/api/topics", { userId, topic, on }); },
  async feed(userId, cursor, limit=10, source=null) {
    const q = new URLSearchParams({ userId, cursor, limit });
    if(source) q.set("source", source);
    return get(`/api/feed?${q}`);
  },
  async item(userId, itemId) { return get(`/api/item?userId=${userId}&itemId=${encodeURIComponent(itemId)}`); },
  async rate(userId, itemId, signal) { return post("/api/rate", { userId, itemId, signal }); },
  async comment(userId, itemId, body) { return post("/api/comment", { userId, itemId, body }); }
};
async function get(u){ const r = await fetch(u); if(!r.ok) throw new Error((await r.json()).error||r.status); return r.json(); }
async function post(u,b){ const r = await fetch(u,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(b)});
  if(!r.ok) throw new Error((await r.json()).error||r.status); return r.json(); }

// ---- state ----
const state = {
  userId: localStorage.getItem("feed_uid") || null,
  cursor: 0, loading: false, exhausted: false,
  activeCategory: null, config: null,
  registry: [], // full /api/communities list (all sources, unfiltered) — labels + frameable lookups
  communities: [], activeSource: localStorage.getItem("feed_src") || null,
  feedScrollY: 0, // remembered scroll position for exact back-restore
  cardsById: new Map(),
  ageVerified: false, showAdult: false,
  // 정치/종교처럼 기본 숨김인 토픽 중 유저가 켠 것들. 서버가 진실의 원천이고
  // (session/me 응답으로 매번 덮어써짐), localStorage는 다음 로드 전까지의 캐시일 뿐.
  showTopics: JSON.parse(localStorage.getItem("feed_topics") || "[]"),
  readSet: new Set(JSON.parse(localStorage.getItem("feed_read")||"[]")),
  openedAt: 0, openItemId: null, // dwell timing for the open post
  openedSet: new Set(), skipSignaled: new Set(), // skip detection bookkeeping
  immersion: false
};
function markRead(id){ if(state.readSet.has(id)) return; state.readSet.add(id);
  localStorage.setItem("feed_read", JSON.stringify([...state.readSet].slice(-1000))); }
history.scrollRestoration = "manual"; // we restore scroll ourselves, precisely

const SRC_COLORS = {}; // stable color per source
const PALETTE = ["#4f8cff","#e5566b","#3fb27f","#f0a13d","#a97bff","#39c0d3","#e871c0","#7fb0ff","#c0d34a"];
function srcColor(id){ if(!SRC_COLORS[id]){ let h=0; for(const c of id) h=(h*31+c.charCodeAt(0))>>>0; SRC_COLORS[id]=PALETTE[h%PALETTE.length]; } return SRC_COLORS[id]; }
function srcLabel(id){ if(id==="me") return "내 글";
  const r = state.registry.find(x=>x.id===id); if(r) return r.labelKo || r.label;
  const s = state.config?.sources.find(x=>x.id===id); return s? s.label : id; }
function timeAgo(iso){ if(!iso) return ""; const d=(Date.now()-new Date(iso))/1e3;
  if(d<3600) return Math.max(1,Math.floor(d/60))+"분 전"; if(d<86400) return Math.floor(d/3600)+"시간 전"; return Math.floor(d/86400)+"일 전"; }

function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1600); }

// Keep --header-h in sync with the header's real rendered height, so the
// sticky source-chip bar (.src-chips, top: var(--header-h)) sits flush under
// it instead of at a guessed fixed pixel value — the header wraps to more
// lines on a narrow phone, shows/hides the 19금 lock badge, etc. ResizeObserver
// catches all of that automatically; the resize listener is just a fallback
// for the rare engine without it.
function syncHeaderHeight(){
  const h = document.querySelector("header");
  if(h) document.documentElement.style.setProperty("--header-h", h.offsetHeight + "px");
}
if("ResizeObserver" in window){
  const headerEl = document.querySelector("header");
  if(headerEl) new ResizeObserver(syncHeaderHeight).observe(headerEl);
} else {
  window.addEventListener("resize", syncHeaderHeight);
}
syncHeaderHeight();

// ---- boot ----
(async function boot(){
  // parallel fetch so the first paint isn't three serial round-trips
  const [config, rulesRes, s, communitiesRes] = await Promise.all([
    API.config(),
    API.rules().catch(()=>({rules:null})),
    API.session(state.userId),
    API.communities().catch(()=>({communities:[]}))
  ]);
  state.config = config; state.rules = rulesRes.rules;
  state.userId = s.userId; localStorage.setItem("feed_uid", s.userId);
  state.ageVerified = s.ageVerified; state.showAdult = s.showAdult; state.nickname = s.nickname;
  state.showTopics = Array.isArray(s.showTopics) ? s.showTopics : [];
  localStorage.setItem("feed_topics", JSON.stringify(state.showTopics));
  state.surveyed = s.surveyed;
  // 소스 칩은 레지스트리에서 동적으로 — 하드코딩 목록 없음. 활성(enabled) + 비성인 소스만.
  state.registry = communitiesRes.communities || [];
  state.communities = state.registry.filter(c => c.enabled && !c.adult);
  renderChips(); renderSourceChips(); renderAdultBtn(); setupAdultToggle(); refreshDrawerFilters();
  setupCompose(); setupSpace(); setupDrawer(); setupSkipObserver();
  // Always show content first — a preview feed (popularity-ranked when no taste
  // yet). Personalization is invited, never a gate. (adversarial review #1)
  updateMeter(s); loadMore(); openFromHash();
  if(!s.surveyed) showPersonalizeBanner(); else showDigest();
  setupInfiniteScroll(); setupImmersion();
})();

// Soft, dismissible invitation to personalize — replaces the old survey wall.
function showPersonalizeBanner(){
  if(document.getElementById("pbanner")) return;
  const bar=document.createElement("div"); bar.id="pbanner"; bar.className="digest";
  bar.innerHTML=`<div class="dtext"><b>지금은 인기글 미리보기</b> · 취향을 맞추면 내 글만 모여요</div>
    <button id="pbGo">취향 맞추기</button><button class="dclose" id="pbX">✕</button>`;
  const feed=document.getElementById("feed"); feed.parentNode.insertBefore(bar, feed);
  bar.querySelector("#pbGo").onclick=()=>showSurvey();
  bar.querySelector("#pbX").onclick=()=>bar.remove();
}

// deep-link: a shared /p?id link bounces to /#post-<id>; open that post
function openFromHash(){
  const h = location.hash;
  if(h && h.startsWith("#post-")){
    const id = decodeURIComponent(h.slice("#post-".length));
    if(id) openDetail(id);
  }
}

// ---- 관심글 알림 (digest + web push) ----
async function showDigest(){
  let d; try { d = await API.digest(state.userId); } catch { return; }
  if(!d || !d.count) return;
  const bar = document.getElementById("digestBar");
  const top = d.top && d.top[0] ? d.top[0].title : "";
  const notifyBtn = ("Notification" in window && Notification.permission !== "granted")
    ? '<button id="dNotify">🔔 알림 받기</button>' : "";
  bar.innerHTML = `<div class="dtext"><b>관심글 ${d.count}개</b>가 올라왔어요${top?` · "${escapeHtml(top.slice(0,24))}…"`:""}</div>${notifyBtn}<button class="dclose" id="dClose">✕</button>`;
  bar.classList.remove("hidden");
  bar.querySelector("#dClose").onclick = ()=> bar.classList.add("hidden");
  const nb = bar.querySelector("#dNotify");
  if(nb) nb.onclick = enableNotifications;
  // if already permitted, fire a real local notification via the service worker
  if("Notification" in window && Notification.permission === "granted") pushLocalNotification(d);
}
// VAPID public key comes base64url-encoded from the server; pushManager.subscribe
// wants it as a raw Uint8Array (applicationServerKey).
function urlBase64ToUint8Array(base64url){
  const pad = "=".repeat((4 - base64url.length % 4) % 4);
  const base64 = (base64url + pad).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(base64);
  return Uint8Array.from([...raw].map((c) => c.charCodeAt(0)));
}
async function enableNotifications(){
  if(!("Notification" in window)){ toast("이 브라우저는 알림을 지원하지 않아요"); return; }
  const perm = await Notification.requestPermission();
  if(perm !== "granted"){ toast("알림이 거부되었어요"); return; }
  // create a real push subscription when the server has VAPID configured
  // (GET /api/push/vapid-key); without a key, degrade to local-only
  // notifications like before — the digest banner still works either way.
  let sub = null;
  try {
    const reg = await navigator.serviceWorker.ready;
    sub = await reg.pushManager.getSubscription();
    if(!sub){
      const { key } = await API.vapidKey().catch(()=>({ key: null }));
      if(key){
        sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(key)
        });
      }
    }
  } catch {}
  try { await API.subscribePush(state.userId, sub ? sub.toJSON() : { local: true }); } catch {}
  toast("알림을 켰어요");
  const d = await API.digest(state.userId).catch(()=>null);
  if(d && d.count) pushLocalNotification(d);
}
async function pushLocalNotification(d){
  try {
    const reg = await navigator.serviceWorker.ready;
    reg.showNotification("내 취향 피드", {
      body: `관심글 ${d.count}개가 올라왔어요` + (d.top&&d.top[0]?` · ${d.top[0].title.slice(0,30)}`:""),
      icon: "/icon.svg", badge: "/icon.svg", tag: "feed-digest"
    });
  } catch {}
}

// ---- ☰ 드로어 (소스별 보기·필터·링크제출·내공간 — David 2026-07-24 UX 개편) ----
// 홈은 통합 핫 피드 하나만 보이고, 나머지 메뉴는 전부 여기 안에서 열고 닫는다.
function openDrawer(){
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawerBack").classList.add("open");
  document.getElementById("drawer").setAttribute("aria-hidden","false");
  document.getElementById("menuBtn").setAttribute("aria-expanded","true");
}
function closeDrawer(){
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawerBack").classList.remove("open");
  document.getElementById("drawer").setAttribute("aria-hidden","true");
  document.getElementById("menuBtn").setAttribute("aria-expanded","false");
}
function setupDrawer(){
  document.getElementById("menuBtn").onclick = openDrawer;
  document.getElementById("drawerClose").onclick = closeDrawer;
  document.getElementById("drawerBack").onclick = closeDrawer;
  document.getElementById("drawerSpaceBtn").onclick = ()=>{ closeDrawer(); openSpace(); };
  document.addEventListener("keydown", (e)=>{
    if(e.key==="Escape" && document.getElementById("drawer").classList.contains("open")) closeDrawer();
  });
}

// ---- 몰입 모드 (community × TikTok, but for text) ----
let immObserver, immActive = null, immActiveAt = 0;
function setupImmersion(){
  document.getElementById("immBtn").onclick = ()=>{
    state.immersion = !state.immersion;
    document.body.classList.toggle("immersion", state.immersion);
    document.getElementById("immBtn").classList.toggle("on", state.immersion);
    if(state.immersion){ startImmersionTracking(); toast("몰입 모드 · 한 글씩 넘겨보세요"); }
    else { stopImmersionTracking(); }
    window.scrollTo(0,0);
  };
}
// track how long each card stays centered → dwell signal per swipe
function startImmersionTracking(){
  immObserver = new IntersectionObserver((entries)=>{
    for(const e of entries){
      if(e.isIntersecting && e.intersectionRatio > 0.6){
        flushImmersionDwell();                    // leaving previous card
        immActive = e.target.dataset.id; immActiveAt = Date.now();
        if(immActive){ markRead(immActive); state.openedSet.add(immActive); }
      }
    }
  }, { root: document.getElementById("feed"), threshold: [0.6] });
  state.cardsById.forEach(c=> immObserver.observe(c));
}
function flushImmersionDwell(){
  if(immActive && immActiveAt){
    const dwellMs = Date.now() - immActiveAt;
    if(dwellMs > 600) API.signal(state.userId, immActive, dwellMs > 8000 ? "complete" : "dwell", dwellMs);
  }
  immActive = null; immActiveAt = 0;
}
function stopImmersionTracking(){ flushImmersionDwell(); if(immObserver){ immObserver.disconnect(); immObserver=null; } }

// ---- 19금 toggle + 성인인증 ----
// The always-visible header "19" quick-toggle was removed in the 2026-07-24
// UX overhaul (home = feed only); adult access now lives in the ☰ drawer's
// 콘텐츠 필터 section (renderDrawerFilters/contentFilterHtml below) and in
// 내 공간. These two functions are kept as safe no-ops in case anything still
// calls them, rather than deleting every call site.
function renderAdultBtn(){
  const b = document.getElementById("adultBtn");
  if(!b) return;
  b.style.display = state.ageVerified ? "" : "none";
  b.classList.toggle("on", state.showAdult);
  b.title = state.showAdult ? "19금 숨기기" : "19금 보기";
}
function setupAdultToggle(){
  const b = document.getElementById("adultBtn");
  if(!b) return;
  b.onclick = async ()=>{
    if(state.showAdult){                 // 켜져 있으면 끄기 (필터링)
      await toggleAdult(false); return;
    }
    if(!state.ageVerified){ showAgeGate(); return; }  // 미인증이면 인증부터
    await toggleAdult(true);              // 인증됨 → 켜기
  };
}
async function toggleAdult(on){
  try {
    const r = await API.setAdult(state.userId, on);
    state.showAdult = r.showAdult; renderAdultBtn(); refreshDrawerFilters();
    reloadFeed(on ? "19금 포함" : "19금 숨김");
  } catch(e){ toast("전환 실패: "+e.message); }
}
function showAgeGate(){
  closeDrawer(); // avoid a double-dim backdrop if opened from inside the drawer
  const back = document.createElement("div"); back.className="modal-back";
  back.innerHTML = `
    <div class="modal">
      <h3>🔞 성인 콘텐츠</h3>
      <p>19금 게시글을 보려면 성인인증이 필요합니다. 만 19세 이상 성인이 맞으신가요? (데모에서는 실제 본인확인 대신 확인만 진행됩니다.)</p>
      <div class="row">
        <button class="cancel" id="ageCancel">취소</button>
        <button class="confirm" id="ageOk">성인인증하기</button>
      </div>
    </div>`;
  document.body.appendChild(back);
  back.querySelector("#ageCancel").onclick = ()=> back.remove();
  back.querySelector("#ageOk").onclick = async ()=>{
    try {
      await API.verifyAge(state.userId); state.ageVerified = true;
      back.remove(); renderAdultBtn(); await toggleAdult(true);
      toast("성인인증 완료");
    } catch(e){ toast("인증 실패: "+e.message); }
  };
}

// ---- 정치/종교 콘텐츠 필터 (기본 숨김, 유저가 켜면 노출) ----
// 성인은 기존 19금 인증/토글(toggleAdult, showAgeGate)을 그대로 재사용한다.
function topicLabel(id){
  const t = state.config?.topics?.find(x=>x.id===id);
  return t ? t.label : id;
}
async function toggleTopic(topic, on){
  try {
    const r = await API.setTopic(state.userId, topic, on);
    state.showTopics = r.showTopics || state.showTopics;
    localStorage.setItem("feed_topics", JSON.stringify(state.showTopics));
    reloadFeedSilently(); refreshDrawerFilters();
    toast(`${topicLabel(topic)} 글 ${on?"보기":"숨기기"}`);
  } catch(e){ toast("전환 실패: "+e.message); }
}

// Shared "콘텐츠 필터" (정치/종교/19금) block — rendered both in 내 공간 and in
// the ☰ drawer, driven by the same state/toggle functions above. Uses
// data-attributes instead of ids so both places can render it at once without
// id collisions.
function contentFilterHtml(){
  return `
    <div class="muted-row">🗳️ 정치 글 보기 <button data-topic-toggle="politics">${state.showTopics.includes("politics")?"숨기기":"보기"}</button></div>
    <div class="muted-row">⛪ 종교 글 보기 <button data-topic-toggle="religion">${state.showTopics.includes("religion")?"숨기기":"보기"}</button></div>
    <div class="muted-row">🔞 성인 콘텐츠(19금) 보기 <button data-adult-toggle>${state.ageVerified?(state.showAdult?"끄기":"켜기"):"성인인증"}</button></div>
    <p style="color:var(--muted);font-size:11.5px;line-height:1.5;margin:6px 0 0">정치·종교 글은 기본적으로 피드에서 숨겨져요. 위 버튼으로 켜고 끌 수 있어요.</p>`;
}
function wireContentFilterButtons(container, onAfter){
  const ae = container.querySelector("[data-adult-toggle]");
  if(ae) ae.onclick = ()=>{
    if(!state.ageVerified){ showAgeGate(); return; }
    toggleAdult(!state.showAdult);
    if(onAfter) onAfter();
  };
  container.querySelectorAll("[data-topic-toggle]").forEach(btn=>{
    btn.onclick = async ()=>{ await toggleTopic(btn.dataset.topicToggle, !state.showTopics.includes(btn.dataset.topicToggle)); if(onAfter) onAfter(); };
  });
}
// re-render the drawer's own filter section in place (state may have changed
// via 내 공간's copy of the same controls, or vice versa)
function refreshDrawerFilters(){
  const el = document.getElementById("drawerFilters");
  if(!el) return;
  el.innerHTML = contentFilterHtml();
  wireContentFilterButtons(el, refreshDrawerFilters);
}
// same idea for 내 공간's copy — `spaceBody` is the #spaceBody element (passed
// in since 내 공간 re-renders its whole panel rather than keeping a live ref)
function refreshSpaceFilters(spaceBody){
  const block = spaceBody.querySelector(".content-filter-block");
  if(!block) return;
  block.innerHTML = contentFilterHtml();
  wireContentFilterButtons(block, ()=> refreshSpaceFilters(spaceBody));
}
// 19금 포함/제외가 바뀌면 후보군이 달라지므로 피드를 새로 로드
function reloadFeed(msg){
  state.cursor = 0; state.exhausted = false; state.loading = false;
  state.cardsById.clear();
  document.getElementById("feed").innerHTML = "";
  window.scrollTo(0, 0);
  if(msg) toast(msg);
  loadMore();
}

// ---- 글쓰기 (user posts) ----
function setupCompose(){
  document.getElementById("composeBtn").onclick = ()=>{
    const cats = state.config.categories.map(c=>`<option value="${c.id}">${c.label}</option>`).join("");
    const back = document.createElement("div"); back.className="modal-back";
    back.innerHTML = `
      <div class="modal">
        <h3>✍️ 새 글 쓰기</h3>
        <div class="field"><label>제목</label><input id="pTitle" maxlength="120" placeholder="제목을 입력하세요"></div>
        <div class="field"><label>내용</label><textarea id="pBody" placeholder="내용을 입력하세요"></textarea></div>
        <div class="field"><label>카테고리</label><select id="pCat">${cats}</select><div class="norm-hint" id="pNorm"></div></div>
        <div class="row">
          <button class="cancel" id="pCancel">취소</button>

// render the taste dashboard from top learned preferences
function tasteHtml(t){
  if(!t) return "";
  const max = Math.max(1, ...[...t.categories,...t.tags,...t.sources].map(x=>x.weight));
  const bars = (arr, neg)=> arr.length ? arr.map(x=>`<div class="bar ${neg?'neg':''}"><span class="name">${escapeHtml(x.label)}</span><div class="track"><div class="fill" style="width:${Math.round(Math.abs(x.weight)/max*100)}%"></div></div></div>`).join("") : '<div style="color:var(--muted);font-size:12px">아직 데이터가 부족해요</div>';
  const row = (label, arr, neg)=> `<div class="taste-row"><div class="tlabel">${label}</div>${bars(arr,neg)}</div>`;
  return `<div class="taste-grid">
    ${row("좋아하는 카테고리", t.categories)}
    ${row("관심 태그", t.tags)}
    ${row("즐겨보는 커뮤니티", t.sources)}
    ${t.disliked&&t.disliked.length?row("덜 보고 싶어함", t.disliked, true):""}
  </div>`;
}

function showSurvey(){
  const wrap = document.getElementById("questions");

    const qEl = document.createElement("div"); qEl.className="q";

// ---- feed ----
async function loadMore(){
  if(state.loading || state.exhausted) return;
  state.loading = true; setSentinel(true);
  try {
    const res = await API.feed(state.userId, state.cursor, 10, state.activeSource);
    state.cursor = res.nextCursor;
    updateMeter(res);
    for(const item of res.items) appendCard(item);
    if(res.exhausted){ state.exhausted=true; setSentinel(false, "새 화제글을 모으는 중… 평가할수록 더 정확해져요"); }
    else setSentinel(false);
    applyFilter();
  } catch(e){ setSentinel(false, "불러오기 실패: "+e.message); }
  finally { state.loading=false; }
}

// 화제성/신선도 뱃지 — proves "this is actually hot right now" (review #3).
// From public signals only: engagement volume + freshness.
function hotBadge(item){
  const ageH = item.publishedAt ? (Date.now()-new Date(item.publishedAt))/3.6e6 : 999;
  const eng = (item.score||0) + (item.comments||0)*2;
  if(eng>=1000 && ageH<12) return '<span class="badge" style="background:#e5566b;color:#fff">🔥 급상승</span>';
  if(eng>=800) return '<span class="badge" style="background:#f0a13d;color:#0e0f13">🔥 화제</span>';
  if(ageH<3) return '<span class="badge" style="background:#3fb27f;color:#0e0f13">🆕 방금</span>';
  return '';
}
function appendCard(item){
  const card = document.createElement("article"); card.className="card"; card.dataset.cat=item.category; card.dataset.id=item.id;
  card.innerHTML = `
    <div class="card-top">
      <span class="dot" style="background:${srcColor(item.source)}"></span>
      <span class="src">${srcLabel(item.source)}</span>
      <span>· ${item.categoryLabel}</span>
      ${hotBadge(item)}
      ${item.via==="submit"?'<span class="badge" style="background:rgba(79,140,255,.18);color:#9fd0ff">📮 유저 제출</span>':''}
      ${item.adult?'<span class="badge adult">19</span>':''}
      ${(item.topics||[]).includes("politics")?'<span class="badge" style="background:var(--card-2);color:var(--muted)">🗳️ 정치</span>':''}
      ${(item.topics||[]).includes("religion")?'<span class="badge" style="background:var(--card-2);color:var(--muted)">⛪ 종교</span>':''}
      ${item.translated?'<span class="badge trans">번역</span>':(item.needsTranslation?'<span class="badge trans">원문</span>':'')}
      <span class="badge ${item.kind}">${item.kind==="news"?"뉴스":"커뮤"}</span>
    </div>
    <h3>${escapeHtml(item.title)}</h3>
    <p>${escapeHtml(item.summary)}</p>
    ${item.reasons&&item.reasons.length?`<div class="reasons">${item.reasons.map(r=>`<span class="why">${escapeHtml(r)}</span>`).join("")}</div>`:''}
    <div class="card-meta">
      <span>▲ ${item.score}</span><span class="open-detail" role="button" tabindex="0" title="댓글 보기">💬 ${item.comments}</span><span>${timeAgo(item.publishedAt)}</span>
      <div class="actions">
        <button class="rate save ${item.saved?'on':''}" title="스크랩">${item.saved?'🔖':'📑'}</button>
        <button class="rate up ${item.myRating>0?'on':''}" data-s="1">👍</button>
        <button class="rate down ${item.myRating<0?'on':''}" data-s="-1">👎</button>
      </div>
    </div>`;
  if(state.readSet.has(item.id)) card.classList.add("read");
  // Card body tap: collected items (via !== "me") leave the app entirely for
  // the original, in a new tab (openOriginal) — legal.md's out-link model,
  // and David's 2026-07-24 final call to drop the in-app iframe viewer
  // (mixed-content/frame-busting edge cases weren't worth the complexity;
  // a new tab is simpler and works for every source uniformly). Our own tab's
  // scroll/menu never moves either way. The user's own posts (via === "me")
  // keep the existing in-app detail. Either way, the 💬 chip is a dedicated
  // escape hatch into the in-app detail/comments — that access path must
  // never disappear, even for collected items.
  card.addEventListener("click", (e)=>{
    if(e.target.closest(".rate")) return;
    if(e.target.closest(".open-detail")){ openDetail(item.id); return; }
    if(item.via !== "me" && item.url){ openOriginal(item); return; }
    openDetail(item.id);
  });
  card.addEventListener("keydown", (e)=>{
    if((e.key==="Enter"||e.key===" ") && e.target.closest(".open-detail")){ e.preventDefault(); openDetail(item.id); }
  });
  card.querySelector(".rate.up").onclick = (e)=>{ e.stopPropagation(); rate(item, card, 1); };
  card.querySelector(".rate.down").onclick = (e)=>{ e.stopPropagation(); rate(item, card, -1); };
  card.querySelector(".rate.save").onclick = async (e)=>{ e.stopPropagation();
    const btn = e.currentTarget; const on = !btn.classList.contains("on");
    btn.classList.toggle("on", on); btn.textContent = on?'🔖':'📑';
    try { await API.save(state.userId, item.id, on); toast(on?"스크랩했어요":"스크랩 해제"); }
    catch(err){ toast("저장 실패: "+err.message); }
  };
  document.getElementById("feed").appendChild(card);
  state.cardsById.set(item.id, card);
  if(skipObserver) skipObserver.observe(card);
  if(state.immersion && immObserver) immObserver.observe(card);
}

async function rate(item, card, signal){
  const up = card.querySelector(".rate.up"), down = card.querySelector(".rate.down");
  const already = (signal>0 && up.classList.contains("on")) || (signal<0 && down.classList.contains("on"));
  up.classList.toggle("on", signal>0 && !already);
  down.classList.toggle("on", signal<0 && !already);
  try {
    const r = await API.rate(state.userId, item.id, already ? 0 : signal);
    updateMeter(r);
    // button color already conveys state; teach once, then stay quiet (review #7)
    if(!state.taughtRate){ state.taughtRate=true; toast("반응할수록 추천이 정확해져요"); }
  } catch(e){ toast("평가 실패: "+e.message); }
}

function updateMeter(info){
  if(info.level==null && info.feedbackCount==null) return;
  const lvl = info.level ?? 0;
  document.getElementById("levelFill").style.width = Math.round(lvl*100)+"%";
  document.getElementById("levelPct").textContent = Math.round(lvl*100)+"%";
  const phase = info.phase;
  const map = { survey:"맞춰가는 중", calibrating:"학습 중", personalized:"맞춤 완성" };
  if(phase) document.getElementById("phaseLabel").textContent = map[phase] || "";
}

function setSentinel(loading, msg){
  const s = document.getElementById("sentinel");
  s.innerHTML = loading ? '<div class="spinner"></div>' : (msg || "");
}
function setupInfiniteScroll(){
  const io = new IntersectionObserver((entries)=>{
    if(entries[0].isIntersecting) loadMore();
  }, { rootMargin: "400px" });
  io.observe(document.getElementById("sentinel"));
}

// Skip detection: a card that was on screen and then scrolled up out of view
// without ever being opened is a weak "not interested" signal (TikTok's scroll-past).
let skipObserver;
function setupSkipObserver(){
  skipObserver = new IntersectionObserver((entries)=>{
    for(const e of entries){
      const id = e.target.dataset.id; if(!id) continue;
      if(e.isIntersecting){ e.target._seenAt = Date.now(); continue; }
      // Count as "not interested" only if the card was actually on screen long
      // enough to be considered (≥1.2s) — fast flick-scrolling must not poison
      // the taste vector (adversarial review: scroll speed ≠ dislike).
      const dwelt = e.target._seenAt ? Date.now() - e.target._seenAt : 0;
      if(dwelt >= 1200 && e.boundingClientRect.top < 0 &&
         !state.openedSet.has(id) && !state.skipSignaled.has(id)){
        state.skipSignaled.add(id);
        API.signal(state.userId, id, "skip");
      }
    }
  }, { threshold: 0.4 });
}

// ---- detail + EXACT back-restore ----
// Bookkeeping shared by both ways a post can be "opened": the in-app detail
// overlay (user's own posts) and a direct new-tab jump to the original
// (every collected item — via !== "me"). Both count as a weak positive signal
// and a local "read" mark; only the overlay path can additionally measure
// dwell (closeDetail), since a new tab gives us no close event to time against.
function markOpened(itemId){
  markRead(itemId);
  state.openedSet.add(itemId);                    // opened → never counts as a skip
  API.signal(state.userId, itemId, "open");        // weak positive: chose to open
  const card = state.cardsById.get(itemId); if(card) card.classList.add("read");
}

// Collected items (via !== "me") leave the app entirely for the original, in
// a new tab — legal.md's out-link model, and David's 2026-07-24 final call to
// drop the in-app iframe viewer in favor of this uniformly for every source
// (no more per-source frameable branching, no mixed-content/frame-busting
// edge cases to defend against). rel=noopener blocks the new tab from
// reaching back into window.opener.
function openOriginal(item){
  markOpened(item.id);
  window.open(item.url, "_blank", "noopener,noreferrer");
}

async function openDetail(itemId){
  state.feedScrollY = window.scrollY;             // remember exactly where we were
  markOpened(itemId);
  state.openedAt = Date.now(); state.openItemId = itemId;
  history.pushState({ view:"detail", itemId }, "", "#post-"+encodeURIComponent(itemId));
  await renderDetail(itemId);
  const d = document.getElementById("detail");
  d.scrollTop = 0; d.classList.add("open"); d.setAttribute("aria-hidden","false");
}
function closeDetail(){
  const d = document.getElementById("detail");
  // dwell signal: how long was this post actually read?
  if(state.openItemId && state.openedAt){
    const dwellMs = Date.now() - state.openedAt;
    const bottom = d.scrollTop + d.clientHeight >= d.scrollHeight - 40;
    API.signal(state.userId, state.openItemId, bottom && dwellMs > 4000 ? "complete" : "dwell", dwellMs);
  }
  state.openItemId = null; state.openedAt = 0;
  d.classList.remove("open"); d.setAttribute("aria-hidden","true");
  // restore feed scroll to the exact pixel the user left from
  window.scrollTo(0, state.feedScrollY);
}
document.getElementById("backBtn").onclick = ()=> history.back();
// one-handed close: swipe right from the left edge (top-left ‹ is out of thumb reach)
(function(){
  const d = document.getElementById("detail");
  let sx=0, sy=0, fromEdge=false;
  d.addEventListener("touchstart", (e)=>{ const t=e.touches[0]; sx=t.clientX; sy=t.clientY; fromEdge=t.clientX<28; }, {passive:true});
  d.addEventListener("touchend", (e)=>{ if(!fromEdge) return; const t=e.changedTouches[0];
    if(t.clientX-sx>70 && Math.abs(t.clientY-sy)<60) history.back(); }, {passive:true});
})();
window.addEventListener("popstate", (e)=>{
  if(document.getElementById("detail").classList.contains("open")) closeDetail();
  if(!document.getElementById("space").classList.contains("hidden")) closeSpace();
  if(document.getElementById("drawer").classList.contains("open")) closeDrawer();
});

async function renderDetail(itemId){
  const body = document.getElementById("detailBody");
  body.innerHTML = '<div class="sentinel"><div class="spinner"></div></div>';
  let item;
  try { item = await API.item(state.userId, itemId); }
  catch(e){ body.innerHTML = "<p>불러오기 실패</p>"; return; }
  document.getElementById("detailSrc").innerHTML =
    `<span class="dot" style="display:inline-block;background:${srcColor(item.source)}"></span> ${srcLabel(item.source)} · ${item.categoryLabel}`;
  // share: native share sheet if available, else copy the OG link
  document.getElementById("shareBtn").onclick = async ()=>{
    const link = location.origin + "/p?id=" + encodeURIComponent(item.id);
    if(navigator.share){ try { await navigator.share({ title: item.title, url: link }); return; } catch {} }
    try { await navigator.clipboard.writeText(link); toast("링크를 복사했어요"); }
    catch { prompt("링크 복사", link); }
  };
  const head = document.querySelector(".detail-head");
  let muteBtn = head.querySelector(".mute-btn:not(#shareBtn)");
  if(!muteBtn){ muteBtn = document.createElement("button"); muteBtn.className="mute-btn"; head.appendChild(muteBtn); }
  if(item.source==="me"){ muteBtn.style.display="none"; }
  else {
    muteBtn.style.display=""; muteBtn.textContent = `🔕 ${srcLabel(item.source)} 그만보기`;
    muteBtn.onclick = async ()=>{
      try { await API.mute(state.userId, item.source, true);
        toast(`${srcLabel(item.source)} 글을 더 이상 안 보여드려요`); history.back();
        reloadFeed(); } catch(e){ toast("실패: "+e.message); }
    };
  }
  body.innerHTML = `
    <h2>${escapeHtml(item.title)}</h2>
    <div class="card-meta" style="margin-bottom:16px">
      <span>▲ ${item.score}</span><span>💬 ${item.thread.length}</span><span>${timeAgo(item.publishedAt)}</span>
      ${item.url?`<a href="${item.url}" target="_blank" rel="noopener" style="color:var(--accent)">원문 →</a>`:""}
    </div>
    <p class="full">${escapeHtml(item.summary)}</p>
    ${item.url && item.source!=="me" ? `
      <a class="readmore" href="${item.url}" target="_blank" rel="noopener">원문에서 계속 읽기 →</a>
      <div class="excerpt-note">저작권 보호를 위해 발췌만 표시돼요 · 전체 글과 원문 댓글은 ${escapeHtml(srcLabel(item.source))}에서</div>
    `:""}
    <div class="detail-actions">
      <button class="rate up ${item.myRating>0?'on':''}" id="dUp">👍 좋아요</button>
      <button class="rate down ${item.myRating<0?'on':''}" id="dDown">👎 별로예요</button>
    </div>
    <div class="comments">
      <h4>댓글 ${item.thread.length}</h4>
      <div class="comment-form">
        <textarea id="cInput" placeholder="댓글을 남겨보세요"></textarea>
        <button id="cSend">등록</button>
      </div>
      <div id="cList"></div>
    </div>`;
  const dUp=document.getElementById("dUp"), dDown=document.getElementById("dDown");
  dUp.onclick = async ()=>{ const on=dUp.classList.contains("on"); dUp.classList.toggle("on",!on); dDown.classList.remove("on");
    updateMeter(await API.rate(state.userId,item.id,on?0:1)); syncCard(item.id, on?0:1); };
  dDown.onclick = async ()=>{ const on=dDown.classList.contains("on"); dDown.classList.toggle("on",!on); dUp.classList.remove("on");
    updateMeter(await API.rate(state.userId,item.id,on?0:-1)); syncCard(item.id, on?0:-1); };
  renderComments(item.thread);
  document.getElementById("cSend").onclick = async ()=>{
    const ta=document.getElementById("cInput"); const txt=ta.value.trim(); if(!txt) return;
    try { const c=await API.comment(state.userId,item.id,txt); item.thread.push(c); ta.value=""; renderComments(item.thread);
      document.querySelector(".comments h4").textContent="댓글 "+item.thread.length; syncCardComments(item.id,item.thread.length); }
    catch(e){ toast("댓글 실패: "+e.message); }
  };
}
function renderComments(thread){
  const list = document.getElementById("cList");
  list.innerHTML = thread.length ? "" : '<p style="color:var(--muted);font-size:13px">첫 댓글을 남겨보세요.</p>';
  for(const c of thread){
    const el=document.createElement("div"); el.className="comment";
    const mine = c.userId && c.userId===state.userId;
    const who = c.author || (mine?(state.nickname||"나"):"익명");
    el.innerHTML = `<div class="who"${mine?' style="color:var(--accent)"':''}>${escapeHtml(who)}${mine?' (나)':''} · ${timeAgo(c.at)}</div><div class="txt">${escapeHtml(c.body)}</div>`;
    list.appendChild(el);
  }
}
// keep the feed card in sync with actions taken in the detail view
function syncCard(itemId, signal){
  const card = state.cardsById.get(itemId); if(!card) return;
  card.querySelector(".rate.up").classList.toggle("on", signal>0);
  card.querySelector(".rate.down").classList.toggle("on", signal<0);
}
function syncCardComments(itemId, n){
  const card = state.cardsById.get(itemId); if(!card) return;
  const meta = card.querySelectorAll(".card-meta > span")[1]; if(meta) meta.textContent = "💬 "+n;
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c])); }

// register the service worker so the app is installable + works offline
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=> navigator.serviceWorker.register("/sw.js").catch(()=>{}));
}
</script>
</body>
</html>
